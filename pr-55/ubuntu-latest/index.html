install' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "## Step 3: Start the daemon and load the blocking module\n\nStart the daemon in the background, then load `test_basic_module` and confirm\nits blocking method works for a single call before piling on concurrent ones.", "execs": []}, {"md": "### 3.1 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Load the module\n\nLoad `test_basic_module` into the running daemon:\n\n```bash\nlogoscore load-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.3 Sanity-check the blocking method\n\nA single call to `echoWithDelay` blocks for the requested time and echoes\nits first argument back. Here we sleep 500 ms and get `warmup` returned:\n\n```bash\nlogoscore call test_basic_module echoWithDelay warmup 500\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module echoWithDelay warmup 500", "status": "pass", "exit_code": 0, "output": "{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"warmup\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "## Step 4: Hit the blocking method from five concurrent clients\n\nNow launch **five client processes at once**, each calling the 2-second\nblocking method. Each `( logoscore call \u2026 ) &` is an independent process \u2014\nequivalent to running the command in five separate shells simultaneously.\nWe time the whole burst and capture each client's reply to its own file.", "execs": []}, {"md": "### 4.1 Fire five concurrent blocking calls\n\nThe five calls are submitted at the same instant. Because the module is\nsingle-threaded, the daemon runs them one at a time, so the total\nwall-clock time is the *sum* of the five 2-second sleeps (~10s) rather\nthan ~2s. We assert it took at least 8 seconds \u2014 proof the calls\nserialized instead of running in parallel \u2014 and that nothing crashed.\n\n```bash\n# Five independent client processes, each a 2-second blocking call.\nfor i in 1 2 3 4 5; do\n  logoscore call test_basic_module echoWithDelay \"client-$i\" 2000 &\ndone\nwait\n```\n\nA single-threaded module can only run one call at a time, so five\nsimultaneous 2-second calls take ~10s end-to-end. If they had run\nconcurrently the burst would have finished in ~2s \u2014 the \u22658s wall-clock\nis the observable signature of clean serialization.", "execs": [{"kind": "run", "cmd": "START=$(date +%s)\nfor i in 1 2 3 4 5; do\n  ( ./logos/bin/logoscore call test_basic_module echoWithDelay \"client-$i\" 2000 > \"call-$i.out\" 2>&1 ) &\ndone\nwait\nEND=$(date +%s)\nELAPSED=$((END - START))\necho \"All 5 concurrent clients returned. Wall-clock: ${ELAPSED}s\"\nif [ \"$ELAPSED\" -ge 8 ]; then\n  echo \"SERIALIZED: total wall-clock ~= sum of the five 2s sleeps (not run in parallel)\"\nelse\n  echo \"UNEXPECTED: burst finished in ${ELAPSED}s \u2014 calls did not serialize as expected\"\nfi\n", "status": "pass", "exit_code": 0, "output": "All 5 concurrent clients returned. Wall-clock: 10s\nSERIALIZED: total wall-clock ~= sum of the five 2s sleeps (not run in parallel)\n", "note": ""}]}, {"md": "### 4.2 Every client got its own correct reply\n\nDespite contending for the same blocked module thread, each of the five\nclients received exactly its own value back \u2014 no replies were dropped,\ncrossed, or corrupted:\n\n```bash\ncat call-1.out call-2.out call-3.out call-4.out call-5.out\n```", "execs": [{"kind": "run", "cmd": "cat call-1.out call-2.out call-3.out call-4.out call-5.out", "status": "pass", "exit_code": 0, "output": "{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"client-1\",\"status\":\"ok\"}\n{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"client-2\",\"status\":\"ok\"}\n{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"client-3\",\"status\":\"ok\"}\n{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"client-4\",\"status\":\"ok\"}\n{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"client-5\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "## Step 5: Confirm the daemon survived the burst\n\nThe whole point is that the concurrent blocking storm causes no crash. Verify\nthe daemon is still running with the module loaded, that nothing crashed, and\nthat ordinary calls keep working.", "execs": []}, {"md": "### 5.1 Daemon and module are still healthy\n\nThe daemon is still `running`, the module still `loaded`, nothing crashed:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":5483,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":2,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 5.2 Ordinary calls still work\n\nA normal, non-blocking call succeeds after the storm:\n\n```bash\nlogoscore call test_basic_module addInts 40 2\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module addInts 40 2", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":42,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.3 Stop the daemon\n\nShut down the daemon cleanly:\n\n```bash\nlogoscore stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.4 Confirm the daemon has stopped\n\nA final `status` confirms the shutdown \u2014 with no daemon running the client\nreports `not_running` (and exits non-zero, so we add `|| true` to let the\ndoc-test assert on the output):\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"547d1870ea52\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}]}, {"meta": {"name": "Running Modules with the logoscore Daemon", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Running Modules with the logoscore Daemon\n\nThis doc-test walks through the **daemon mode** of `logoscore`: start a long-running\nprocess, inspect its status, load a module, introspect and call it, watch its\nresource usage, unload and reload it, and finally shut the daemon down \u2014 verifying\nat each stage that the command had the effect we expect.\n\n`logoscore` is the headless CLI frontend for the Logos platform. In daemon mode\n(`-D`), it runs in the background and exposes client subcommands (`status`,\n`list-modules`, `load-module`, `module-info`, `stats`, `call`, `unload-module`,\n`reload-module`, `stop`, \u2026) that connect over a local RPC channel.\n\n**What you'll learn:**\n\n- How to build and run the logoscore CLI\n- How to prepare a modules directory for the daemon to scan\n- How to start the daemon in the background and capture its logs\n- How to inspect the daemon and the modules it has discovered\n- How to load a module, introspect it with `module-info`, and call its methods\n- How to read per-module resource usage with `stats`\n- How `status` reflects the module lifecycle as you load, unload, and reload\n- How to stop the daemon and confirm it has actually exited\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`", "execs": []}, {"md": "## Step 1: Build logoscore\n\nBuild the logoscore CLI from the published flake. The result is symlinked to\n`./logos/` for easy reference in the steps below.", "execs": []}, {"md": "### 1.1 Build the CLI\n\n```bash\nnix build 'github:logos-co/logos-logoscore-cli/fc323a19b9d66fad766fa7039673f8c600a674b8' --out-link ./logos\n```\n\nThe build produces `logos/bin/logoscore` plus bundled runtime libraries and\na `logos/modules/` directory containing the built-in `capability_module`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-logoscore-cli/fc323a19b9d66fad766fa7039673f8c600a674b8' --out-link ./logos", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Prepare a modules directory\n\n`logoscore -m ./modules` scans `./modules/` for subdirectories containing\n`manifest.json`. We install `test_basic_module` from logos-test-modules and\ncopy the bundled `capability_module` (required for auth when loading modules).", "execs": []}, {"md": "### 2.1 Install a module to load\n\nBuild `test_basic_module` and merge it with the bundled capability module\ninto `./modules/`:\n\n```bash\nSYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\ncp -RL ./result-module/modules/. ./modules/\n\n```\n\nThe modules directory now contains:\n\n```\nmodules/\n\u251c\u2500\u2500 capability_module/\n\u2502   \u251c\u2500\u2500 manifest.json\n\u2502   \u2514\u2500\u2500 capability_module_plugin.{so,dylib}\n\u2514\u2500\u2500 test_basic_module/\n    \u251c\u2500\u2500 manifest.json\n    \u2514\u2500\u2500 test_basic_module_plugin.{so,dylib}\n```", "execs": [{"kind": "run", "cmd": "SYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\ncp -RL ./result-module/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 3: Run the daemon and call a module\n\nStart the daemon in the background, then use client subcommands to interact\nwith it. Output from the daemon process is captured in `logs.txt`.", "execs": []}, {"md": "### 3.1 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```\n\nThe `-D` flag starts the daemon. The client subcommands in the following\nsteps connect to this running process via the config written under\n`~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Inspect the startup log\n\nReview the daemon's startup output:\n\n```bash\ncat logs.txt\n```", "execs": [{"kind": "run", "cmd": "cat logs.txt", "status": "pass", "exit_code": 0, "output": "[2026-06-24 12:10:27.414] [warning] [logos] Module capability_module carries no usable logos_protocol_version (pre-protocol build) \u2014 loading permissively\n[2026-06-24 12:10:27.655] [info] [logos] Module loaded: capability_module\nLogoscore daemon started (pid 5591, instance e45707fcfe10)\nDaemon state: /tmp/doctest-test-ncyj26kt/.logoscore/daemon/state.json\nLocal client config: /tmp/doctest-test-ncyj26kt/.logoscore/client/config.json\n", "note": ""}]}, {"md": "### 3.3 Check daemon status\n\nVerify the daemon is running and inspect its health:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":5591,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "### 3.4 List discovered modules\n\nList modules visible in the scan directory:\n\n```bash\nlogoscore list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore list-modules", "status": "pass", "exit_code": 0, "output": "[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}]\n", "note": ""}]}, {"md": "### 3.5 Load the module\n\nLoad `test_basic_module` into the running daemon:\n\n```bash\nlogoscore load-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.6 Confirm the module is now loaded\n\nRe-run `status`. The module that was `not_loaded` before now reports\n`loaded` (the client emits JSON when its output is piped, as it is here):\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":5591,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":2,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 3.7 Module subprocesses are isolated from the launcher's process group\n\nWith a module loaded, the daemon is running it in its own subprocess\n(`logos_host`). The daemon itself stays in the **foreground**, in its\nlauncher's process group, so a shell, `systemd`, or Docker manages it\nnormally \u2014 but each `logos_host` must lead its **own** process group, not\nstay in the daemon's (i.e. the launcher's). Otherwise tearing the module\ntree down on shutdown, or any process-group signal aimed at the daemon,\nleaks into the launcher and can kill the shell driving it (a teardown\nstep dying with exit `-15` on Linux).\n\nWe take a module subprocess (a `logos_host` child of the daemon) and\nassert it is its **own** process-group leader (`pgid == pid`) and is\n**not** in the daemon's group.\n\n```bash\n# a module subprocess must lead its own group: pgid == pid, != daemon\ndpid=$(logoscore status --json | jq .daemon.pid)\nhost=$(pgrep -P \"$dpid\" -f logos_host | head -1)\n[ \"$host\" = \"$(ps -o pgid= -p \"$host\" | tr -d ' ')\" ] && echo ISOLATED\n```", "execs": [{"kind": "run", "cmd": "dpid=$(./logos/bin/logoscore status --json | python3 -c \"import json,sys;print(json.load(sys.stdin)['daemon']['pid'])\")\ndpgid=$(ps -o pgid= -p \"$dpid\" | tr -d ' ')\nresult=NO_MODULE_SUBPROCESS\nfor hp in $(pgrep -f logos_host); do\n  [ \"$(ps -o ppid= -p \"$hp\" | tr -d ' ')\" = \"$dpid\" ] || continue\n  hpgid=$(ps -o pgid= -p \"$hp\" | tr -d ' ')\n  if [ \"$hp\" = \"$hpgid\" ] && [ \"$hpgid\" != \"$dpgid\" ]; then\n    result=MODULE_SUBPROCESS_ISOLATED; break\n  else\n    result=MODULE_SUBPROCESS_SHARES_LAUNCHER_GROUP\n  fi\ndone\necho \"daemon_pid=$dpid daemon_pgid=$dpgid -> $result\"\n", "status": "pass", "exit_code": 0, "output": "daemon_pid=5591 daemon_pgid=2089 -> MODULE_SUBPROCESS_ISOLATED\n", "note": ""}]}, {"md": "### 3.8 Inspect the module with module-info\n\n`module-info` shows a single module's status and the `Q_INVOKABLE`\nmethods it exposes \u2014 the same methods you can `call`:\n\n```bash\nlogoscore module-info test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore module-info test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"events\":[],\"methods\":[{\"isInvokable\":false,\"name\":\"eventResponse\",\"parameters\":[{\"name\":\"eventName\",\"type\":\"QString\"},{\"name\":\"args\",\"type\":\"QVariantList\"}],\"returnType\":\"void\",\"signature\":\"eventResponse(QString,QVariantList)\"},{\"isInvokable\":true,\"name\":\"initLogos\",\"parameters\":[{\"name\":\"logosAPIInstance\",\"type\":\"LogosAPI*\"}],\"returnType\":\"void\",\"signature\":\"initLogos(LogosAPI*)\"},{\"isInvokable\":true,\"name\":\"doNothing\",\"returnType\":\"void\",\"signature\":\"doNothing()\"},{\"isInvokable\":true,\"name\":\"doNothingWithArgs\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"int\"}],\"returnType\":\"void\",\"signature\":\"doNothingWithArgs(QString,int)\"},{\"isInvokable\":true,\"name\":\"returnTrue\",\"returnType\":\"bool\",\"signature\":\"returnTrue()\"},{\"isInvokable\":true,\"name\":\"returnFalse\",\"returnType\":\"bool\",\"signature\":\"returnFalse()\"},{\"isInvokable\":true,\"name\":\"isPositive\",\"parameters\":[{\"name\":\"value\",\"type\":\"int\"}],\"returnType\":\"bool\",\"signature\":\"isPositive(int)\"},{\"isInvokable\":true,\"name\":\"returnInt\",\"returnType\":\"int\",\"signature\":\"returnInt()\"},{\"isInvokable\":true,\"name\":\"addInts\",\"parameters\":[{\"name\":\"a\",\"type\":\"int\"},{\"name\":\"b\",\"type\":\"int\"}],\"returnType\":\"int\",\"signature\":\"addInts(int,int)\"},{\"isInvokable\":true,\"name\":\"stringLength\",\"parameters\":[{\"name\":\"s\",\"type\":\"QString\"}],\"returnType\":\"int\",\"signature\":\"stringLength(QString)\"},{\"isInvokable\":true,\"name\":\"returnString\",\"returnType\":\"QString\",\"signature\":\"returnString()\"},{\"isInvokable\":true,\"name\":\"echo\",\"parameters\":[{\"name\":\"input\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"echo(QString)\"},{\"isInvokable\":true,\"name\":\"concat\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"concat(QString,QString)\"},{\"isInvokable\":true,\"name\":\"successResult\",\"returnType\":\"LogosResult\",\"signature\":\"successResult()\"},{\"isInvokable\":true,\"name\":\"errorResult\",\"returnType\":\"LogosResult\",\"signature\":\"errorResult()\"},{\"isInvokable\":true,\"name\":\"resultWithMap\",\"returnType\":\"LogosResult\",\"signature\":\"resultWithMap()\"},{\"isInvokable\":true,\"name\":\"resultWithList\",\"returnType\":\"LogosResult\",\"signature\":\"resultWithList()\"},{\"isInvokable\":true,\"name\":\"validateInput\",\"parameters\":[{\"name\":\"input\",\"type\":\"QString\"}],\"returnType\":\"LogosResult\",\"signature\":\"validateInput(QString)\"},{\"isInvokable\":true,\"name\":\"returnVariantInt\",\"returnType\":\"QVariant\",\"signature\":\"returnVariantInt()\"},{\"isInvokable\":true,\"name\":\"returnVariantString\",\"returnType\":\"QVariant\",\"signature\":\"returnVariantString()\"},{\"isInvokable\":true,\"name\":\"returnVariantMap\",\"returnType\":\"QVariant\",\"signature\":\"returnVariantMap()\"},{\"isInvokable\":true,\"name\":\"returnVariantList\",\"returnType\":\"QVariant\",\"signature\":\"returnVariantList()\"},{\"isInvokable\":true,\"name\":\"returnJsonArray\",\"returnType\":\"QJsonArray\",\"signature\":\"returnJsonArray()\"},{\"isInvokable\":true,\"name\":\"makeJsonArray\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"QString\"}],\"returnType\":\"QJsonArray\",\"signature\":\"makeJsonArray(QString,QString)\"},{\"isInvokable\":true,\"name\":\"returnStringList\",\"returnType\":\"QStringList\",\"signature\":\"returnStringList()\"},{\"isInvokable\":true,\"name\":\"splitString\",\"parameters\":[{\"name\":\"input\",\"type\":\"QString\"}],\"returnType\":\"QStringList\",\"signature\":\"splitString(QString)\"},{\"isInvokable\":true,\"name\":\"echoInt\",\"parameters\":[{\"name\":\"n\",\"type\":\"int\"}],\"returnType\":\"int\",\"signature\":\"echoInt(int)\"},{\"isInvokable\":true,\"name\":\"echoBool\",\"parameters\":[{\"name\":\"b\",\"type\":\"bool\"}],\"returnType\":\"bool\",\"signature\":\"echoBool(bool)\"},{\"isInvokable\":true,\"name\":\"joinStrings\",\"parameters\":[{\"name\":\"list\",\"type\":\"QStringList\"}],\"returnType\":\"QString\",\"signature\":\"joinStrings(QStringList)\"},{\"isInvokable\":true,\"name\":\"byteArraySize\",\"parameters\":[{\"name\":\"data\",\"type\":\"QByteArray\"}],\"returnType\":\"int\",\"signature\":\"byteArraySize(QByteArray)\"},{\"isInvokable\":true,\"name\":\"urlToString\",\"parameters\":[{\"name\":\"url\",\"type\":\"QUrl\"}],\"returnType\":\"QString\",\"signature\":\"urlToString(QUrl)\"},{\"isInvokable\":true,\"name\":\"noArgs\",\"returnType\":\"QString\",\"signature\":\"noArgs()\"},{\"isInvokable\":true,\"name\":\"oneArg\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"oneArg(QString)\"},{\"isInvokable\":true,\"name\":\"twoArgs\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"int\"}],\"returnType\":\"QString\",\"signature\":\"twoArgs(QString,int)\"},{\"isInvokable\":true,\"name\":\"threeArgs\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"int\"},{\"name\":\"c\",\"type\":\"bool\"}],\"returnType\":\"QString\",\"signature\":\"threeArgs(QString,int,bool)\"},{\"isInvokable\":true,\"name\":\"fourArgs\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"int\"},{\"name\":\"c\",\"type\":\"bool\"},{\"name\":\"d\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"fourArgs(QString,int,bool,QString)\"},{\"isInvokable\":true,\"name\":\"fiveArgs\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"int\"},{\"name\":\"c\",\"type\":\"bool\"},{\"name\":\"d\",\"type\":\"QString\"},{\"name\":\"e\",\"type\":\"int\"}],\"returnType\":\"QString\",\"signature\":\"fiveArgs(QString,int,bool,QString,int)\"},{\"isInvokable\":true,\"name\":\"emitTestEvent\",\"parameters\":[{\"name\":\"data\",\"type\":\"QString\"}],\"returnType\":\"void\",\"signature\":\"emitTestEvent(QString)\"},{\"isInvokable\":true,\"name\":\"emitMultiArgEvent\",\"parameters\":[{\"name\":\"name\",\"type\":\"QString\"},{\"name\":\"count\",\"type\":\"int\"}],\"returnType\":\"void\",\"signature\":\"emitMultiArgEvent(QString,int)\"},{\"isInvokable\":true,\"name\":\"echoWithDelay\",\"parameters\":[{\"name\":\"value\",\"type\":\"QString\"},{\"name\":\"delayMs\",\"type\":\"int\"}],\"returnType\":\"QString\",\"signature\":\"echoWithDelay(QString,int)\"},{\"isInvokable\":true,\"name\":\"crashOnDemand\",\"returnType\":\"void\",\"signature\":\"crashOnDemand()\"}],\"name\":\"test_basic_module\",\"status\":\"loaded\"}\n", "note": ""}]}, {"md": "### 3.9 Check resource usage with stats\n\n`stats` reports per-module resource usage (process id, CPU, memory) for\nthe modules the daemon is running:\n\n```bash\nlogoscore stats\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stats", "status": "pass", "exit_code": 0, "output": "[{\"cpu_percent\":0,\"cpu_time_seconds\":0,\"memory_mb\":23.0546875,\"name\":\"test_basic_module\"},{\"cpu_percent\":0,\"cpu_time_seconds\":0,\"memory_mb\":23.05859375,\"name\":\"capability_module\"}]\n", "note": ""}]}, {"md": "### 3.10 Call methods\n\nInvoke methods on the loaded module:\n\n```bash\nlogoscore call test_basic_module returnTrue\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module returnTrue", "status": "pass", "exit_code": 0, "output": "{\"method\":\"returnTrue\",\"module\":\"test_basic_module\",\"result\":true,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module addInts 2 3\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module addInts 2 3", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":5,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module echo hello\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module echo hello", "status": "pass", "exit_code": 0, "output": "{\"method\":\"echo\",\"module\":\"test_basic_module\",\"result\":\"hello\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module returnString\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module returnString", "status": "pass", "exit_code": 0, "output": "{\"method\":\"returnString\",\"module\":\"test_basic_module\",\"result\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.11 Unload the module\n\nRemove `test_basic_module` from the daemon:\n\n```bash\nlogoscore unload-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore unload-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"module\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.12 Confirm the unload took effect\n\nA `call` against the now-unloaded module is rejected \u2014 the daemon reports\nthat it is not loaded:\n\n```bash\nlogoscore call test_basic_module returnTrue\n```\n\n> The trailing `|| true` lets the doc-test continue past the expected\n> non-zero exit code so we can assert on the error message.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module returnTrue || true", "status": "pass", "exit_code": 0, "output": "{\"code\":\"METHOD_FAILED\",\"message\":\"Call to test_basic_module.returnTrue failed.\",\"status\":\"error\"}\n", "note": ""}]}, {"md": "### 3.13 Reload the module\n\n`reload-module` unloads and re-loads a module in one step (handy after\nrebuilding it). The module is loaded and callable again afterwards:\n\n```bash\nlogoscore reload-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore reload-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"action\":\"reload\",\"module\":\"test_basic_module\",\"previous_status\":\"not_loaded\",\"status\":\"loaded\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module addInts 40 2\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module addInts 40 2", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":42,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.14 Stop the daemon\n\nShut down the daemon cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe daemon removes its state file and exits. You can also stop it with\n`Ctrl+C` if running in the foreground, or by sending `SIGTERM` to the\ndaemon PID shown in `logoscore status`.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.15 Confirm the daemon has stopped\n\nA final `status` confirms the shutdown. With no daemon running, the\nclient reports `not_running` instead of connecting (and exits non-zero,\nso we add `|| true` to let the doc-test assert on the output):\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"e45707fcfe10\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}, {"md": "### 3.16 A worker is not orphaned if the daemon crashes\n\nThe flip side of detaching workers into their own process group: a\nmodule subprocess must not be left **running** if the daemon dies\n*without* cleaning it up. We start a throwaway daemon, **hard-kill** it\n(`SIGKILL`, so no graceful teardown runs), and confirm its module\nsubprocess exits on its own \u2014 via `PR_SET_PDEATHSIG` on Linux and a\n`getppid` watchdog on other platforms. (Graceful shutdown, above, still\nreaps workers per-PID; this covers the crash path.)\n\n```bash\n# hard-kill the daemon; its module subprocess must exit on its own\nlogoscore -D -m ./modules &      # (throwaway)\nkill -9 \"$(logoscore status --json | jq .daemon.pid)\"\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore -D --config-dir ./crashcfg -m ./modules > crash.log 2>&1 &\nsleep 5\ndpid=$(./logos/bin/logoscore --config-dir ./crashcfg status --json | python3 -c \"import json,sys;print(json.load(sys.stdin)['daemon']['pid'])\")\nworker=\"\"\nfor h in $(pgrep -f logos_host); do\n  [ \"$(ps -o ppid= -p \"$h\" | tr -d ' ')\" = \"$dpid\" ] && { worker=\"$h\"; break; }\ndone\necho \"daemon=$dpid worker=$worker\"\nkill -9 \"$dpid\"\nresult=LEAKED\nfor i in $(seq 1 10); do\n  kill -0 \"$worker\" 2>/dev/null || { result=WORKER_CLEANED_UP; break; }\n  sleep 1\ndone\necho \"RESULT=$result\"\n", "status": "pass", "exit_code": 0, "output": "daemon=5640 worker=5643\nRESULT=WORKER_CLEANED_UP\n", "note": ""}]}]}, {"meta": {"name": "Reaching the logoscore Daemon over TCP and TCP+TLS", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Reaching the logoscore Daemon over TCP and TCP+TLS\n\nBy default the `logoscore` daemon binds every module to a local Unix socket,\nso only clients on the same host \u2014 using the auto-emitted config under\n`~/.logoscore/` \u2014 can reach it. This doc-test shows how to expose the daemon\nover the network instead, using the two non-local transports `logoscore`\nsupports:\n\n- **`tcp`** \u2014 a plaintext TCP listener. Good for loopback and trusted\n  networks. On a non-loopback host it puts the auth token on the wire in\n  cleartext, so the daemon refuses to bind it there without `--insecure-tcp`.\n- **`tcp_ssl`** \u2014 a TLS-wrapped TCP listener. The wire is encrypted with a\n  server certificate; the client verifies that certificate against a CA.\n\nWe drive everything on a single host over the loopback interface\n(`127.0.0.1`) so the doc-test is self-contained and needs no second machine,\nbut the moving parts \u2014 a per-module network listener on the daemon, a\nhand-written `client/config.json` dial spec, and a copied auth token \u2014 are\nexactly the ones a real remote client uses.\n\n> \u26a0\ufe0f **Remote operation is under active development.** The transport flags,\n> the `client/config.json` schema, and the auth model may change between\n> releases. Local same-host use is the stable path. In particular, this\n> walkthrough authenticates the network client with the daemon's\n> **auto-emitted token** (`client/auto.json`), which is the credential the\n> daemon registers for itself at boot \u2014 operator-issued `issue-token`\n> credentials are not yet honored for `core_service` calls over the network.\n\n**What you'll learn:**\n\n- How the daemon's per-module transports work and why `local` is always present\n- How to add a `tcp` listener to the well-known modules with `--module-transport`\n- Why both `core_service` and `capability_module` must be exposed, not just one\n- How the plaintext-TCP guard protects you from leaking tokens on the wire\n- How to write a `client/config.json` dial spec and point a client at it with `--config-dir`\n- How to copy the daemon's auth token into the client config directory\n- How to drive the daemon (`status`, `load-module`, `call`, \u2026) over TCP\n- How to switch the same setup to `tcp_ssl` with a self-signed certificate\n- How TLS peer verification fails closed when the client has no CA to trust\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **OpenSSL** on `PATH` (only the final TLS section needs it) to generate a\nthrowaway self-signed certificate.\n\nVerify: `openssl version`", "execs": []}, {"md": "## Step 1: Build logoscore and prepare modules\n\nBuild the CLI and assemble a modules directory, exactly as in the daemon\ndoc-test. The daemon needs the bundled `capability_module` (used for the\nclient handshake) plus at least one ordinary module to load and call \u2014\nhere `test_basic_module` from logos-test-modules.", "execs": []}, {"md": "### 1.1 Build the CLI\n\n```bash\nnix build 'github:logos-co/logos-logoscore-cli/fc323a19b9d66fad766fa7039673f8c600a674b8' --out-link ./logos\n```\n\nThe build produces `logos/bin/logoscore` plus a `logos/modules/`\ndirectory containing the built-in `capability_module`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-logoscore-cli/fc323a19b9d66fad766fa7039673f8c600a674b8' --out-link ./logos", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 1.2 Install a module to load\n\nBuild `test_basic_module` and merge it with the bundled capability\nmodule into `./modules/`:\n\n```bash\nSYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\n# cp -RL copies the read-only nix-store trees as read-only files, so a\n# re-run (or a pre-populated modules/) can't overwrite them. Restore\n# write permission first to keep the copy idempotent.\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./logos/modules/. ./modules/\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./result-module/modules/. ./modules/\n\n```\n\n```\nmodules/\n\u251c\u2500\u2500 capability_module/\n\u2502   \u251c\u2500\u2500 manifest.json\n\u2502   \u2514\u2500\u2500 capability_module_plugin.{so,dylib}\n\u2514\u2500\u2500 test_basic_module/\n    \u251c\u2500\u2500 manifest.json\n    \u2514\u2500\u2500 test_basic_module_plugin.{so,dylib}\n```", "execs": [{"kind": "run", "cmd": "SYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\n# cp -RL copies the read-only nix-store trees as read-only files, so a\n# re-run (or a pre-populated modules/) can't overwrite them. Restore\n# write permission first to keep the copy idempotent.\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./logos/modules/. ./modules/\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./result-module/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Start the daemon with TCP listeners\n\n`--module-transport NAME=PROTOCOL[,k=v...]` adds one network listener to\nthe named module. We bind **both** well-known modules on loopback:\n`core_service` on port 6000 and `capability_module` on port 6001.\n\nTwo things worth calling out:\n\n- **`local` is always present.** Every configured module keeps its\n  same-host Unix-socket listener; the `tcp` entry is an *additional*\n  outside-facing surface. That's what lets the daemon's own\n  intra-process calls keep working while remote clients use TCP.\n- **Expose `capability_module`, not just `core_service`.** Before its\n  first call, a client performs a `requestModule` handshake against\n  `capability_module` to resolve the endpoint. A remote client has no\n  Unix socket to the daemon, so that handshake has to ride the network\n  too. Expose only `core_service` and remote client commands hang or fail\n  at connect time.\n\nWe use `--config-dir ./daemon-home` to keep all daemon state inside the\nworking directory instead of `~/.logoscore`.", "execs": []}, {"md": "### 2.1 Refuse plaintext TCP on a public interface\n\nFirst, a guardrail. Plaintext `tcp` on a non-loopback host would put\nthe auth token on the wire in cleartext, so the daemon refuses to bind\nit unless you explicitly pass `--insecure-tcp`. Watch it reject a\n`0.0.0.0` listener (the `|| true` lets the doc-test continue past the\nexpected non-zero exit):\n\n```bash\nlogoscore -D -m ./modules --module-transport core_service=tcp,host=0.0.0.0,port=6000\n```\n\nOn loopback (`127.0.0.1`) there is nothing to leak to, so the same\nflag binds without the escape hatch \u2014 which is what we do next.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./daemon-home -D -m ./modules --module-transport core_service=tcp,host=0.0.0.0,port=6000 2>&1 || true", "status": "pass", "exit_code": 0, "output": "Error: module 'core_service' binds plaintext tcp on non-loopback host '0.0.0.0'. Use protocol=tcp_ssl, or pass --insecure-tcp if you really mean it.\n", "note": ""}]}, {"md": "### 2.2 Start the daemon on loopback TCP\n\nStart the daemon in the background with TCP listeners for both\nwell-known modules, capturing its output to `daemon.log`:\n\n```bash\nlogoscore -D -m ./modules \\\n    --module-transport core_service=tcp,host=127.0.0.1,port=6000 \\\n    --module-transport capability_module=tcp,host=127.0.0.1,port=6001 \\\n    > daemon.log &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore --config-dir ./daemon-home -D -m ./modules --module-transport core_service=tcp,host=127.0.0.1,port=6000 --module-transport capability_module=tcp,host=127.0.0.1,port=6001 > daemon.log 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 4\n```", "execs": [{"kind": "run", "cmd": "sleep 4", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 2.3 Confirm the resolved transports\n\nThe daemon records the transports it actually bound in\n`daemon/state.json`. Each well-known module shows the implicit\n`local` listener first, followed by the `tcp` one we asked for:\n\n```bash\ncat ~/.logoscore/daemon/state.json\n```", "execs": [{"kind": "run", "cmd": "cat ./daemon-home/daemon/state.json", "status": "pass", "exit_code": 0, "output": "{\n    \"config_source\": \"cli\",\n    \"instance_id\": \"ebc2134b999a\",\n    \"pid\": 5706,\n    \"resolved\": {\n        \"insecure_tcp\": false,\n        \"modules\": {\n            \"capability_module\": {\n                \"transports\": [\n                    {\n                        \"protocol\": \"local\"\n                    },\n                    {\n                        \"codec\": \"json\",\n                        \"host\": \"127.0.0.1\",\n                        \"port\": 6001,\n                        \"protocol\": \"tcp\"\n                    }\n                ]\n            },\n            \"core_service\": {\n                \"transports\": [\n                    {\n                        \"protocol\": \"local\"\n                    },\n                    {\n                        \"codec\": \"json\",\n                        \"host\": \"127.0.0.1\",\n                        \"port\": 6000,\n                        \"protocol\": \"tcp\"\n                    }\n                ]\n            }\n        },\n        \"modules_dirs\": [\n            \"./modules\"\n        ],\n        \"persistence_path\": \"\",\n        \"ssl\": {\n            \"ca\": \"\",\n            \"cert\": \"\",\n            \"key\": \"\"\n        }\n    },\n    \"started_at\": \"2026-06-24T12:11:20Z\",\n    \"version\": 2\n}\n", "note": ""}]}, {"md": "## Step 3: Point a client at the daemon over TCP\n\nA network client doesn't read the daemon's files \u2014 it dials whatever its\nown `client/config.json` says and authenticates with a token file beside\nit. We build a **separate** config directory (`./client-home`) to make the\nclient/daemon split explicit, then point the client at it with\n`--config-dir`.\n\nThe directory layout the client expects:\n\n```\nclient-home/            \u2190 pass this to --config-dir\n\u2514\u2500\u2500 client/\n    \u251c\u2500\u2500 config.json     \u2190 the dial spec\n    \u2514\u2500\u2500 auto.json       \u2190 the auth token referenced by token_file\n```", "execs": []}, {"md": "### 3.1 Copy the daemon's auth token\n\nAt boot the daemon emits its own token to\n`client/auto.json` under its config dir. Copy that into the client's\n`client/` directory \u2014 it's the credential the client will present:\n\n```bash\nmkdir -p ./client-home/client\ncp ./daemon-home/client/auto.json ./client-home/client/auto.json\n\n```\n\n> On a real remote host you'd `scp` this file across instead of\n> copying it locally. Treat it as a secret: anything holding it can\n> drive the daemon.", "execs": [{"kind": "run", "cmd": "mkdir -p ./client-home/client\ncp ./daemon-home/client/auto.json ./client-home/client/auto.json\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Write the dial spec\n\nThe `client/config.json` schema is version `2`. `token_file` names the\nfile you just copied, and the `daemon` block lists one entry per\nmodule with its transport, host, and port \u2014 matching the listeners the\ndaemon bound. Both `core_service` and `capability_module` are required:\n\n```bash\ncat > ./client-home/client/config.json <<'JSON'\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6000 },\n        \"capability_module\": { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6001 }\n    }\n}\nJSON\n\n```", "execs": [{"kind": "run", "cmd": "cat > ./client-home/client/config.json <<'JSON'\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6000 },\n        \"capability_module\": { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6001 }\n    }\n}\nJSON\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.3 Check daemon status over TCP\n\nWith the dial spec in place, every client command works against\n`--config-dir ./client-home` \u2014 the traffic now goes over TCP:\n\n```bash\nlogoscore --config-dir ./client-home status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":5706,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "### 3.4 List, load, and call over TCP\n\nDrive the module lifecycle exactly as you would locally:\n\n```bash\nlogoscore --config-dir ./client-home list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home list-modules", "status": "pass", "exit_code": 0, "output": "[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}]\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./client-home load-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home load-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./client-home call test_basic_module addInts 2 3\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home call test_basic_module addInts 2 3", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":5,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.5 Stop the daemon\n\nShut the TCP daemon down before moving on to the TLS variant:\n\n```bash\nlogoscore --config-dir ./client-home stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 4: Encrypt the wire with tcp_ssl\n\n`tcp` is fine on loopback, but across any untrusted network you want the\nwire encrypted. The `tcp_ssl` protocol wraps the same TCP listener in TLS.\nThe daemon side adds `cert=` and `key=` (the server's certificate and\nprivate key); the client side adds a `ca` to verify that certificate\nagainst, plus `verify_peer`.\n\nTLS verifies the certificate's host name against the address the client\ndialed, so the certificate must cover `127.0.0.1`. We generate a throwaway\nself-signed certificate whose Subject Alternative Name includes it, and\nuse that same certificate as the client's CA.", "execs": []}, {"md": "### 4.1 Generate a self-signed certificate\n\nCreate a key + certificate with `subjectAltName=IP:127.0.0.1`. Because\nit's self-signed, the certificate is also its own CA \u2014 so we copy it to\n`ca.pem` for the client to trust:\n\n```bash\nmkdir -p tls\nopenssl req -x509 -newkey rsa:2048 -nodes \\\n  -keyout tls/key.pem -out tls/cert.pem -days 365 \\\n  -subj \"/CN=logoscore-test\" \\\n  -addext \"subjectAltName=IP:127.0.0.1,DNS:localhost\"\ncp tls/cert.pem tls/ca.pem\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p tls\nopenssl req -x509 -newkey rsa:2048 -nodes \\\n  -keyout tls/key.pem -out tls/cert.pem -days 365 \\\n  -subj \"/CN=logoscore-test\" \\\n  -addext \"subjectAltName=IP:127.0.0.1,DNS:localhost\"\ncp tls/cert.pem tls/ca.pem\n", "status": "pass", "exit_code": 0, "output": "..+......+...+..+...+.............+..+...+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++*..+....+.........+...........+.......+...+.....+.+........+.......+.....+.+...+..+...+......+......+...+.......+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++*.+...............+.........+......+...+............+..............+...+..........+...+..+.+.....+....+...+..+.......+......+...+.........+........+...+.+...+..+......+.........+.+..+.+.................+....+...............+.....+.+..................+..+....+....................+....+.....+.....................+...+.+.........+............+...+..+...............+...+...+....+...+.....+.......+......+...+............+..+.+..+.........+....+.....+....+.....+......+......+.........+..........+..+...+......+..........+......+...+...............+..+....+...+..+..........+...............+..............+...................+...........+....+..+.+...+..+........................+...+......+.......+.....+....+......+..+...............+.+............+..+............+.+.....+.............+......+.....+....+......+...+............+.....+.+..+.+.....+......+.+...+............+.....+...+.+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++\n........+...+.......+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++*...+.+..+.+.........+............+.....+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++*.......+.....+......+............+....+...+........+.......+..+..................+.+..+.......+......+.....+....+........+...+.+.....+...+......+.........+.+.....+.........+...+....+.....+................+..+.......+...+......+..+.......+.....+.+...........+.+...............+...+..+....+........+......+.+...+.................+....+..+.........+.........+............+...+.......+..............+.+..+.......+...+............+......+........+....+...+..+...+............+...+..........+..+.......+...+.................+....+..............+......+....+..+......+...+................+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++\n-----\n", "note": ""}]}, {"md": "### 4.2 Start the daemon with tcp_ssl listeners\n\nBind both well-known modules over `tcp_ssl`, passing the cert and key.\nOn loopback no `--insecure-tcp` is involved at all \u2014 TLS is never\nplaintext:\n\n```bash\nlogoscore -D -m ./modules \\\n    --module-transport \"core_service=tcp_ssl,host=127.0.0.1,port=6443,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" \\\n    --module-transport \"capability_module=tcp_ssl,host=127.0.0.1,port=6444,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" \\\n    > tls-daemon.log &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore --config-dir ./tls-daemon-home -D -m ./modules --module-transport \"core_service=tcp_ssl,host=127.0.0.1,port=6443,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" --module-transport \"capability_module=tcp_ssl,host=127.0.0.1,port=6444,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" > tls-daemon.log 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 4\n```", "execs": [{"kind": "run", "cmd": "sleep 4", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.3 Write the TLS dial spec\n\nThe client config is the same shape as before, but `transport` becomes\n`tcp_ssl` and each module entry gains `ca` (the certificate to trust)\nand `verify_peer: true`:\n\n```bash\nmkdir -p ./tls-client-home/client\ncp ./tls-daemon-home/client/auto.json ./tls-client-home/client/auto.json\ncat > ./tls-client-home/client/config.json <<JSON\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6443, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true },\n        \"capability_module\": { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6444, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true }\n    }\n}\nJSON\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p ./tls-client-home/client\ncp ./tls-daemon-home/client/auto.json ./tls-client-home/client/auto.json\ncat > ./tls-client-home/client/config.json <<JSON\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6443, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true },\n        \"capability_module\": { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6444, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true }\n    }\n}\nJSON\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.4 Drive the daemon over TLS\n\nStatus, load, and call now travel over an encrypted connection:\n\n```bash\nlogoscore --config-dir ./tls-client-home status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-client-home status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":5737,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./tls-client-home load-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-client-home load-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./tls-client-home call test_basic_module addInts 40 2\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-client-home call test_basic_module addInts 40 2", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":42,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.5 Verification fails closed without the CA\n\nTLS is only as good as the verification behind it. Re-point the client\nat the same `tcp_ssl` endpoint but drop the `ca` while keeping\n`verify_peer: true` \u2014 the client has nothing to anchor the daemon's\nself-signed certificate to, so the handshake is rejected and the\ndaemon is reported unreachable (the `|| true` lets the doc-test assert\non the failure):\n\n```bash\nlogoscore --config-dir ./tls-client-home status   # no ca \u2192 rejected\n```\n\n> To intentionally skip verification in a dev setup, set\n> `\"verify_peer\": false` (or pass `--no-verify-peer`) instead of\n> omitting the CA \u2014 but never do that against a real network.", "execs": [{"kind": "run", "cmd": "cat > ./tls-client-home/client/config.json <<'JSON'\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6443, \"verify_peer\": true },\n        \"capability_module\": { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6444, \"verify_peer\": true }\n    }\n}\nJSON\n./logos/bin/logoscore --config-dir ./tls-client-home status || true\n", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}, {"md": "### 4.6 Stop the TLS daemon\n\n```bash\nlogoscore --config-dir ./tls-daemon-home stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-daemon-home stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
