ogoscore-cli' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "## Step 2: Prepare a modules directory\n\n`logoscore -m ./modules` scans `./modules/` for subdirectories containing\n`manifest.json`. We install `test_basic_module` from logos-test-modules and\ncopy the bundled `capability_module` (required for auth when loading modules).", "execs": []}, {"md": "### 2.1 Install a module to load\n\nBuild `test_basic_module` and merge it with the bundled capability module\ninto `./modules/`:\n\n```bash\nSYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\ncp -RL ./result-module/modules/. ./modules/\n\n```\n\nThe modules directory now contains:\n\n```\nmodules/\n\u251c\u2500\u2500 capability_module/\n\u2502   \u251c\u2500\u2500 manifest.json\n\u2502   \u2514\u2500\u2500 capability_module_plugin.{so,dylib}\n\u2514\u2500\u2500 test_basic_module/\n    \u251c\u2500\u2500 manifest.json\n    \u2514\u2500\u2500 test_basic_module_plugin.{so,dylib}\n```", "execs": [{"kind": "run", "cmd": "SYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\ncp -RL ./result-module/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-test-modules/ab4be29aae379624e7e1dfa71e34a8a9ae067116' into the Git cache...\nunpacking 'github:logos-co/logos-logoscore-cli/519e7d391191fcbfe53d1e794236d750d738c5b2?narHash=sha256-zsFBiX2E1C8VAWxuspNZcFOPyC804A%2BX0yIMpra6bTs%3D' into the Git cache...\nunpacking 'github:logos-co/logos-module-client/7abdc8b5eb62af51b7336310df70ec52c8bef4fb?narHash=sha256-E2gSZWQGrTAbXhgr1ViaiPJ/zFr5W6NxplDHL8yRuXg%3D' into the Git cache...\nunpacking 'git "}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module echo hello\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module echo hello", "status": "pass", "exit_code": 0, "output": "{\"method\":\"echo\",\"module\":\"test_basic_module\",\"result\":\"hello\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module returnString\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module returnString", "status": "pass", "exit_code": 0, "output": "{\"method\":\"returnString\",\"module\":\"test_basic_module\",\"result\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.10 Unload the module\n\nRemove `test_basic_module` from the daemon:\n\n```bash\nlogoscore unload-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore unload-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"module\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.11 Confirm the unload took effect\n\nA `call` against the now-unloaded module is rejected \u2014 the daemon reports\nthat it is not loaded:\n\n```bash\nlogoscore call test_basic_module returnTrue\n```\n\n> The trailing `|| true` lets the doc-test continue past the expected\n> non-zero exit code so we can assert on the error message.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module returnTrue || true", "status": "pass", "exit_code": 0, "output": "{\"code\":\"RPC_FAILED\",\"message\":\"callModuleMethod('test_basic_module','returnTrue') RPC call failed.\",\"status\":\"error\"}\n", "note": ""}]}, {"md": "### 3.12 Reload the module\n\n`reload-module` unloads and re-loads a module in one step (handy after\nrebuilding it). The module is loaded and callable again afterwards:\n\n```bash\nlogoscore reload-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore reload-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"action\":\"reload\",\"module\":\"test_basic_module\",\"previous_status\":\"not_loaded\",\"status\":\"loaded\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module addInts 40 2\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module addInts 40 2", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":42,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.13 Stop the daemon\n\nShut down the daemon cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe daemon removes its state file and exits. You can also stop it with\n`Ctrl+C` if running in the foreground, or by sending `SIGTERM` to the\ndaemon PID shown in `logoscore status`.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.14 Confirm the daemon has stopped\n\nA final `status` confirms the shutdown. With no daemon running, the\nclient reports `not_running` instead of connecting (and exits non-zero,\nso we add `|| true` to let the doc-test assert on the output):\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"e44fb5771b23\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}]}, {"meta": {"name": "Reaching the logoscore Daemon over TCP and TCP+TLS", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Reaching the logoscore Daemon over TCP and TCP+TLS\n\nBy default the `logoscore` daemon binds every module to a local Unix socket,\nso only clients on the same host \u2014 using the auto-emitted config under\n`~/.logoscore/` \u2014 can reach it. This doc-test shows how to expose the daemon\nover the network instead, using the two non-local transports `logoscore`\nsupports:\n\n- **`tcp`** \u2014 a plaintext TCP listener. Good for loopback and trusted\n  networks. On a non-loopback host it puts the auth token on the wire in\n  cleartext, so the daemon refuses to bind it there without `--insecure-tcp`.\n- **`tcp_ssl`** \u2014 a TLS-wrapped TCP listener. The wire is encrypted with a\n  server certificate; the client verifies that certificate against a CA.\n\nWe drive everything on a single host over the loopback interface\n(`127.0.0.1`) so the doc-test is self-contained and needs no second machine,\nbut the moving parts \u2014 a per-module network listener on the daemon, a\nhand-written `client/config.json` dial spec, and a copied auth token \u2014 are\nexactly the ones a real remote client uses.\n\n> \u26a0\ufe0f **Remote operation is under active development.** The transport flags,\n> the `client/config.json` schema, and the auth model may change between\n> releases. Local same-host use is the stable path. In particular, this\n> walkthrough authenticates the network client with the daemon's\n> **auto-emitted token** (`client/auto.json`), which is the credential the\n> daemon registers for itself at boot \u2014 operator-issued `issue-token`\n> credentials are not yet honored for `core_service` calls over the network.\n\n**What you'll learn:**\n\n- How the daemon's per-module transports work and why `local` is always present\n- How to add a `tcp` listener to the well-known modules with `--module-transport`\n- Why both `core_service` and `capability_module` must be exposed, not just one\n- How the plaintext-TCP guard protects you from leaking tokens on the wire\n- How to write a `client/config.json` dial spec and point a client at it with `--config-dir`\n- How to copy the daemon's auth token into the client config directory\n- How to drive the daemon (`status`, `load-module`, `call`, \u2026) over TCP\n- How to switch the same setup to `tcp_ssl` with a self-signed certificate\n- How TLS peer verification fails closed when the client has no CA to trust\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **OpenSSL** on `PATH` (only the final TLS section needs it) to generate a\nthrowaway self-signed certificate.\n\nVerify: `openssl version`", "execs": []}, {"md": "## Step 1: Build logoscore and prepare modules\n\nBuild the CLI and assemble a modules directory, exactly as in the daemon\ndoc-test. The daemon needs the bundled `capability_module` (used for the\nclient handshake) plus at least one ordinary module to load and call \u2014\nhere `test_basic_module` from logos-test-modules.", "execs": []}, {"md": "### 1.1 Build the CLI\n\n```bash\nnix build 'github:logos-co/logos-logoscore-cli/7f2bd35b65cf616a9a23496edaed5f31a3f14f26' --out-link ./logos\n```\n\nThe build produces `logos/bin/logoscore` plus a `logos/modules/`\ndirectory containing the built-in `capability_module`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-logoscore-cli/7f2bd35b65cf616a9a23496edaed5f31a3f14f26' --out-link ./logos", "status": "pass", "exit_code": 0, "output": "GC Warning: Repeated allocation of very large block (appr. size 408 KiB):\n\tMay lead to memory leak and poor performance\nGC Warning: Repeated allocation of very large block (appr. size 408 KiB):\n\tMay lead to memory leak and poor performance\nGC Warning: Repeated allocation of very large block (appr. size 408 KiB):\n\tMay lead to memory leak and poor performance\nGC Warning: Repeated allocation of very large block (appr. size 408 KiB):\n\tMay lead to memory leak and poor performance\nGC Warning: Repeated allocation of very large block (appr. size 412 KiB):\n\tMay lead to memory leak and poor performance\nGC Warning: Repeated allocation of very large block (appr. size 408 KiB):\n\tMay lead to memory leak and poor performance\nGC Warning: Repeated allocation of very large block (appr. size 408 KiB):\n\tMay lead to memory leak and poor performance\n", "note": ""}]}, {"md": "### 1.2 Install a module to load\n\nBuild `test_basic_module` and merge it with the bundled capability\nmodule into `./modules/`:\n\n```bash\nSYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\n# cp -RL copies the read-only nix-store trees as read-only files, so a\n# re-run (or a pre-populated modules/) can't overwrite them. Restore\n# write permission first to keep the copy idempotent.\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./logos/modules/. ./modules/\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./result-module/modules/. ./modules/\n\n```\n\n```\nmodules/\n\u251c\u2500\u2500 capability_module/\n\u2502   \u251c\u2500\u2500 manifest.json\n\u2502   \u2514\u2500\u2500 capability_module_plugin.{so,dylib}\n\u2514\u2500\u2500 test_basic_module/\n    \u251c\u2500\u2500 manifest.json\n    \u2514\u2500\u2500 test_basic_module_plugin.{so,dylib}\n```", "execs": [{"kind": "run", "cmd": "SYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\n# cp -RL copies the read-only nix-store trees as read-only files, so a\n# re-run (or a pre-populated modules/) can't overwrite them. Restore\n# write permission first to keep the copy idempotent.\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./logos/modules/. ./modules/\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./result-module/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Start the daemon with TCP listeners\n\n`--module-transport NAME=PROTOCOL[,k=v...]` adds one network listener to\nthe named module. We bind **both** well-known modules on loopback:\n`core_service` on port 6000 and `capability_module` on port 6001.\n\nTwo things worth calling out:\n\n- **`local` is always present.** Every configured module keeps its\n  same-host Unix-socket listener; the `tcp` entry is an *additional*\n  outside-facing surface. That's what lets the daemon's own\n  intra-process calls keep working while remote clients use TCP.\n- **Expose `capability_module`, not just `core_service`.** Before its\n  first call, a client performs a `requestModule` handshake against\n  `capability_module` to resolve the endpoint. A remote client has no\n  Unix socket to the daemon, so that handshake has to ride the network\n  too. Expose only `core_service` and remote client commands hang or fail\n  at connect time.\n\nWe use `--config-dir ./daemon-home` to keep all daemon state inside the\nworking directory instead of `~/.logoscore`.", "execs": []}, {"md": "### 2.1 Refuse plaintext TCP on a public interface\n\nFirst, a guardrail. Plaintext `tcp` on a non-loopback host would put\nthe auth token on the wire in cleartext, so the daemon refuses to bind\nit unless you explicitly pass `--insecure-tcp`. Watch it reject a\n`0.0.0.0` listener (the `|| true` lets the doc-test continue past the\nexpected non-zero exit):\n\n```bash\nlogoscore -D -m ./modules --module-transport core_service=tcp,host=0.0.0.0,port=6000\n```\n\nOn loopback (`127.0.0.1`) there is nothing to leak to, so the same\nflag binds without the escape hatch \u2014 which is what we do next.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./daemon-home -D -m ./modules --module-transport core_service=tcp,host=0.0.0.0,port=6000 2>&1 || true", "status": "pass", "exit_code": 0, "output": "Error: module 'core_service' binds plaintext tcp on non-loopback host '0.0.0.0'. Use protocol=tcp_ssl, or pass --insecure-tcp if you really mean it.\n", "note": ""}]}, {"md": "### 2.2 Start the daemon on loopback TCP\n\nStart the daemon in the background with TCP listeners for both\nwell-known modules, capturing its output to `daemon.log`:\n\n```bash\nlogoscore -D -m ./modules \\\n    --module-transport core_service=tcp,host=127.0.0.1,port=6000 \\\n    --module-transport capability_module=tcp,host=127.0.0.1,port=6001 \\\n    > daemon.log &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore --config-dir ./daemon-home -D -m ./modules --module-transport core_service=tcp,host=127.0.0.1,port=6000 --module-transport capability_module=tcp,host=127.0.0.1,port=6001 > daemon.log 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 4\n```", "execs": [{"kind": "run", "cmd": "sleep 4", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 2.3 Confirm the resolved transports\n\nThe daemon records the transports it actually bound in\n`daemon/state.json`. Each well-known module shows the implicit\n`local` listener first, followed by the `tcp` one we asked for:\n\n```bash\ncat ~/.logoscore/daemon/state.json\n```", "execs": [{"kind": "run", "cmd": "cat ./daemon-home/daemon/state.json", "status": "pass", "exit_code": 0, "output": "{\n    \"config_source\": \"cli\",\n    \"instance_id\": \"7bff64b85fd3\",\n    \"pid\": 6016,\n    \"resolved\": {\n        \"insecure_tcp\": false,\n        \"modules\": {\n            \"capability_module\": {\n                \"transports\": [\n                    {\n                        \"protocol\": \"local\"\n                    },\n                    {\n                        \"codec\": \"json\",\n                        \"host\": \"127.0.0.1\",\n                        \"port\": 6001,\n                        \"protocol\": \"tcp\"\n                    }\n                ]\n            },\n            \"core_service\": {\n                \"transports\": [\n                    {\n                        \"protocol\": \"local\"\n                    },\n                    {\n                        \"codec\": \"json\",\n                        \"host\": \"127.0.0.1\",\n                        \"port\": 6000,\n                        \"protocol\": \"tcp\"\n                    }\n                ]\n            }\n        },\n        \"modules_dirs\": [\n            \"./modules\"\n        ],\n        \"persistence_path\": \"\",\n        \"ssl\": {\n            \"ca\": \"\",\n            \"cert\": \"\",\n            \"key\": \"\"\n        }\n    },\n    \"started_at\": \"2026-06-16T22:19:27Z\",\n    \"version\": 2\n}\n", "note": ""}]}, {"md": "## Step 3: Point a client at the daemon over TCP\n\nA network client doesn't read the daemon's files \u2014 it dials whatever its\nown `client/config.json` says and authenticates with a token file beside\nit. We build a **separate** config directory (`./client-home`) to make the\nclient/daemon split explicit, then point the client at it with\n`--config-dir`.\n\nThe directory layout the client expects:\n\n```\nclient-home/            \u2190 pass this to --config-dir\n\u2514\u2500\u2500 client/\n    \u251c\u2500\u2500 config.json     \u2190 the dial spec\n    \u2514\u2500\u2500 auto.json       \u2190 the auth token referenced by token_file\n```", "execs": []}, {"md": "### 3.1 Copy the daemon's auth token\n\nAt boot the daemon emits its own token to\n`client/auto.json` under its config dir. Copy that into the client's\n`client/` directory \u2014 it's the credential the client will present:\n\n```bash\nmkdir -p ./client-home/client\ncp ./daemon-home/client/auto.json ./client-home/client/auto.json\n\n```\n\n> On a real remote host you'd `scp` this file across instead of\n> copying it locally. Treat it as a secret: anything holding it can\n> drive the daemon.", "execs": [{"kind": "run", "cmd": "mkdir -p ./client-home/client\ncp ./daemon-home/client/auto.json ./client-home/client/auto.json\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Write the dial spec\n\nThe `client/config.json` schema is version `2`. `token_file` names the\nfile you just copied, and the `daemon` block lists one entry per\nmodule with its transport, host, and port \u2014 matching the listeners the\ndaemon bound. Both `core_service` and `capability_module` are required:\n\n```bash\ncat > ./client-home/client/config.json <<'JSON'\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6000 },\n        \"capability_module\": { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6001 }\n    }\n}\nJSON\n\n```", "execs": [{"kind": "run", "cmd": "cat > ./client-home/client/config.json <<'JSON'\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6000 },\n        \"capability_module\": { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6001 }\n    }\n}\nJSON\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.3 Check daemon status over TCP\n\nWith the dial spec in place, every client command works against\n`--config-dir ./client-home` \u2014 the traffic now goes over TCP:\n\n```bash\nlogoscore --config-dir ./client-home status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":6016,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "### 3.4 List, load, and call over TCP\n\nDrive the module lifecycle exactly as you would locally:\n\n```bash\nlogoscore --config-dir ./client-home list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home list-modules", "status": "pass", "exit_code": 0, "output": "[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}]\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./client-home load-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home load-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./client-home call test_basic_module addInts 2 3\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home call test_basic_module addInts 2 3", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":5,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.5 Stop the daemon\n\nShut the TCP daemon down before moving on to the TLS variant:\n\n```bash\nlogoscore --config-dir ./client-home stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 4: Encrypt the wire with tcp_ssl\n\n`tcp` is fine on loopback, but across any untrusted network you want the\nwire encrypted. The `tcp_ssl` protocol wraps the same TCP listener in TLS.\nThe daemon side adds `cert=` and `key=` (the server's certificate and\nprivate key); the client side adds a `ca` to verify that certificate\nagainst, plus `verify_peer`.\n\nTLS verifies the certificate's host name against the address the client\ndialed, so the certificate must cover `127.0.0.1`. We generate a throwaway\nself-signed certificate whose Subject Alternative Name includes it, and\nuse that same certificate as the client's CA.", "execs": []}, {"md": "### 4.1 Generate a self-signed certificate\n\nCreate a key + certificate with `subjectAltName=IP:127.0.0.1`. Because\nit's self-signed, the certificate is also its own CA \u2014 so we copy it to\n`ca.pem` for the client to trust:\n\n```bash\nmkdir -p tls\nopenssl req -x509 -newkey rsa:2048 -nodes \\\n  -keyout tls/key.pem -out tls/cert.pem -days 365 \\\n  -subj \"/CN=logoscore-test\" \\\n  -addext \"subjectAltName=IP:127.0.0.1,DNS:localhost\"\ncp tls/cert.pem tls/ca.pem\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p tls\nopenssl req -x509 -newkey rsa:2048 -nodes \\\n  -keyout tls/key.pem -out tls/cert.pem -days 365 \\\n  -subj \"/CN=logoscore-test\" \\\n  -addext \"subjectAltName=IP:127.0.0.1,DNS:localhost\"\ncp tls/cert.pem tls/ca.pem\n", "status": "pass", "exit_code": 0, "output": "Generating a RSA private key\n................................................................................................................................................................................................................................+++++\n.........................+++++\nwriting new private key to 'tls/key.pem'\n-----\n", "note": ""}]}, {"md": "### 4.2 Start the daemon with tcp_ssl listeners\n\nBind both well-known modules over `tcp_ssl`, passing the cert and key.\nOn loopback no `--insecure-tcp` is involved at all \u2014 TLS is never\nplaintext:\n\n```bash\nlogoscore -D -m ./modules \\\n    --module-transport \"core_service=tcp_ssl,host=127.0.0.1,port=6443,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" \\\n    --module-transport \"capability_module=tcp_ssl,host=127.0.0.1,port=6444,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" \\\n    > tls-daemon.log &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore --config-dir ./tls-daemon-home -D -m ./modules --module-transport \"core_service=tcp_ssl,host=127.0.0.1,port=6443,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" --module-transport \"capability_module=tcp_ssl,host=127.0.0.1,port=6444,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" > tls-daemon.log 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 4\n```", "execs": [{"kind": "run", "cmd": "sleep 4", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.3 Write the TLS dial spec\n\nThe client config is the same shape as before, but `transport` becomes\n`tcp_ssl` and each module entry gains `ca` (the certificate to trust)\nand `verify_peer: true`:\n\n```bash\nmkdir -p ./tls-client-home/client\ncp ./tls-daemon-home/client/auto.json ./tls-client-home/client/auto.json\ncat > ./tls-client-home/client/config.json <<JSON\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6443, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true },\n        \"capability_module\": { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6444, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true }\n    }\n}\nJSON\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p ./tls-client-home/client\ncp ./tls-daemon-home/client/auto.json ./tls-client-home/client/auto.json\ncat > ./tls-client-home/client/config.json <<JSON\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6443, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true },\n        \"capability_module\": { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6444, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true }\n    }\n}\nJSON\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.4 Drive the daemon over TLS\n\nStatus, load, and call now travel over an encrypted connection:\n\n```bash\nlogoscore --config-dir ./tls-client-home status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-client-home status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":6181,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./tls-client-home load-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-client-home load-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./tls-client-home call test_basic_module addInts 40 2\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-client-home call test_basic_module addInts 40 2", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":42,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.5 Verification fails closed without the CA\n\nTLS is only as good as the verification behind it. Re-point the client\nat the same `tcp_ssl` endpoint but drop the `ca` while keeping\n`verify_peer: true` \u2014 the client has nothing to anchor the daemon's\nself-signed certificate to, so the handshake is rejected and the\ndaemon is reported unreachable (the `|| true` lets the doc-test assert\non the failure):\n\n```bash\nlogoscore --config-dir ./tls-client-home status   # no ca \u2192 rejected\n```\n\n> To intentionally skip verification in a dev setup, set\n> `\"verify_peer\": false` (or pass `--no-verify-peer`) instead of\n> omitting the CA \u2014 but never do that against a real network.", "execs": [{"kind": "run", "cmd": "cat > ./tls-client-home/client/config.json <<'JSON'\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6443, \"verify_peer\": true },\n        \"capability_module\": { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6444, \"verify_peer\": true }\n    }\n}\nJSON\n./logos/bin/logoscore --config-dir ./tls-client-home status || true\n", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}, {"md": "### 4.6 Stop the TLS daemon\n\n```bash\nlogoscore --config-dir ./tls-daemon-home stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-daemon-home stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
