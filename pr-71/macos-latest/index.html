 "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_basic_module\",\"status\":\"ok\",\"version\":\"1.0.0\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./client-home call test_basic_module addInts 2 3\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home call test_basic_module addInts 2 3", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":5,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.5 Stop the daemon\n\nShut the TCP daemon down before moving on to the TLS variant:\n\n```bash\nlogoscore --config-dir ./client-home stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 4: Encrypt the wire with tcp_ssl\n\n`tcp` is fine on loopback, but across any untrusted network you want the\nwire encrypted. The `tcp_ssl` protocol wraps the same TCP listener in TLS.\nThe daemon side adds `cert=` and `key=` (the server's certificate and\nprivate key); the client side adds a `ca` to verify that certificate\nagainst, plus `verify_peer`.\n\nTLS verifies the certificate's host name against the address the client\ndialed, so the certificate must cover `127.0.0.1`. We generate a throwaway\nself-signed certificate whose Subject Alternative Name includes it, and\nuse that same certificate as the client's CA.", "execs": []}, {"md": "### 4.1 Generate a self-signed certificate\n\nCreate a key + certificate with `subjectAltName=IP:127.0.0.1`. Because\nit's self-signed, the certificate is also its own CA \u2014 so we copy it to\n`ca.pem` for the client to trust:\n\n```bash\nmkdir -p tls\nopenssl req -x509 -newkey rsa:2048 -nodes \\\n  -keyout tls/key.pem -out tls/cert.pem -days 365 \\\n  -subj \"/CN=logoscore-test\" \\\n  -addext \"subjectAltName=IP:127.0.0.1,DNS:localhost\"\ncp tls/cert.pem tls/ca.pem\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p tls\nopenssl req -x509 -newkey rsa:2048 -nodes \\\n  -keyout tls/key.pem -out tls/cert.pem -days 365 \\\n  -subj \"/CN=logoscore-test\" \\\n  -addext \"subjectAltName=IP:127.0.0.1,DNS:localhost\"\ncp tls/cert.pem tls/ca.pem\n", "status": "pass", "exit_code": 0, "output": ".+.....+.+......+...+..+.+++++++++++++++++++++++++++++++++++++++*....+.....+...+............+...+++++++++++++++++++++++++++++++++++++++*..+......+.+..+...+....+.....+.........+.........+..........+.....+.......+...+...........+.........+.+...........+.+...+......+.....+.+..+......+.+.....+..................+.+......+.....++++++\n.+...........+++++++++++++++++++++++++++++++++++++++*.....+.........+.+.....+.+++++++++++++++++++++++++++++++++++++++*.+..........+........+.+.....+...+......+.......+...+.........+........+......................+..+.+..+.+..+.......+.....+...+...............+.........+.+...+.....+..........+.....+.+...+..+...+......+......+.+.................+..............................+.......+.........+.....+..........+.....+.+......+.....+.......+...+..............+...+...+....+.....+......+...+....+......+..+...+....+.................+.+.........+....................+.+...+.....+......+....+......+...+..+......+...+.......+..+..........+...+...+...........+.+..+.............+............+......++++++\n-----\n", "note": ""}]}, {"md": "### 4.2 Start the daemon with tcp_ssl listeners\n\nBind both well-known modules over `tcp_ssl`, passing the cert and key.\nOn loopback no `--insecure-tcp` is involved at all \u2014 TLS is never\nplaintext:\n\n```bash\nlogoscore -D -m ./modules \\\n    --module-transport \"core_service=tcp_ssl,host=127.0.0.1,port=6443,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" \\\n    --module-transport \"capability_module=tcp_ssl,host=127.0.0.1,port=6444,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" \\\n    > tls-daemon.log &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore --config-dir ./tls-daemon-home -D -m ./modules --module-transport \"core_service=tcp_ssl,host=127.0.0.1,port=6443,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" --module-transport \"capability_module=tcp_ssl,host=127.0.0.1,port=6444,cert=$PWD/tls/cert.pem,key=$PWD/tls/key.pem\" > tls-daemon.log 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 4\n```", "execs": [{"kind": "run", "cmd": "sleep 4", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.3 Write the TLS dial spec\n\nThe client config is the same shape as before, but `transport` becomes\n`tcp_ssl` and each module entry gains `ca` (the certificate to trust)\nand `verify_peer: true`:\n\n```bash\nmkdir -p ./tls-client-home/client\ncp ./tls-daemon-home/client/auto.json ./tls-client-home/client/auto.json\ncat > ./tls-client-home/client/config.json <<JSON\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6443, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true },\n        \"capability_module\": { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6444, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true }\n    }\n}\nJSON\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p ./tls-client-home/client\ncp ./tls-daemon-home/client/auto.json ./tls-client-home/client/auto.json\ncat > ./tls-client-home/client/config.json <<JSON\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6443, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true },\n        \"capability_module\": { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6444, \"ca\": \"$PWD/tls/ca.pem\", \"verify_peer\": true }\n    }\n}\nJSON\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.4 Drive the daemon over TLS\n\nStatus, load, and call now travel over an encrypted connection:\n\n```bash\nlogoscore --config-dir ./tls-client-home status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-client-home status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":21545,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\",\"version\":\"1.0.0\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":4,\"version\":\"1.0.0\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./tls-client-home load-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-client-home load-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_basic_module\",\"status\":\"ok\",\"version\":\"1.0.0\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./tls-client-home call test_basic_module addInts 40 2\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-client-home call test_basic_module addInts 40 2", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":42,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.5 Verification fails closed without the CA\n\nTLS is only as good as the verification behind it. Re-point the client\nat the same `tcp_ssl` endpoint but drop the `ca` while keeping\n`verify_peer: true` \u2014 the client has nothing to anchor the daemon's\nself-signed certificate to, so the handshake is rejected and the\ndaemon is reported unreachable (the `|| true` lets the doc-test assert\non the failure):\n\n```bash\nlogoscore --config-dir ./tls-client-home status   # no ca \u2192 rejected\n```\n\n> To intentionally skip verification in a dev setup, set\n> `\"verify_peer\": false` (or pass `--no-verify-peer`) instead of\n> omitting the CA \u2014 but never do that against a real network.", "execs": [{"kind": "run", "cmd": "cat > ./tls-client-home/client/config.json <<'JSON'\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6443, \"verify_peer\": true },\n        \"capability_module\": { \"transport\": \"tcp_ssl\", \"host\": \"127.0.0.1\", \"port\": 6444, \"verify_peer\": true }\n    }\n}\nJSON\n./logos/bin/logoscore --config-dir ./tls-client-home status || true\n", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"status\":\"not_running\",\"version\":\"pre-release-6dfb85d\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}, {"md": "### 4.6 Stop the TLS daemon\n\n```bash\nlogoscore --config-dir ./tls-daemon-home stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./tls-daemon-home stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
