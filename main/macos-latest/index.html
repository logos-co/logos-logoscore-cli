it_code": 0, "output": "{\"method\":\"returnTrue\",\"module\":\"test_basic_module\",\"result\":true,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module addInts 2 3\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module addInts 2 3", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":5,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module echo hello\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module echo hello", "status": "pass", "exit_code": 0, "output": "{\"method\":\"echo\",\"module\":\"test_basic_module\",\"result\":\"hello\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module returnString\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module returnString", "status": "pass", "exit_code": 0, "output": "{\"method\":\"returnString\",\"module\":\"test_basic_module\",\"result\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.10 Unload the module\n\nRemove `test_basic_module` from the daemon:\n\n```bash\nlogoscore unload-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore unload-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"module\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.11 Confirm the unload took effect\n\nA `call` against the now-unloaded module is rejected \u2014 the daemon reports\nthat it is not loaded:\n\n```bash\nlogoscore call test_basic_module returnTrue\n```\n\n> The trailing `|| true` lets the doc-test continue past the expected\n> non-zero exit code so we can assert on the error message.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module returnTrue || true", "status": "pass", "exit_code": 0, "output": "{\"code\":\"RPC_FAILED\",\"message\":\"callModuleMethod('test_basic_module','returnTrue') RPC call failed.\",\"status\":\"error\"}\n", "note": ""}]}, {"md": "### 3.12 Reload the module\n\n`reload-module` unloads and re-loads a module in one step (handy after\nrebuilding it). The module is loaded and callable again afterwards:\n\n```bash\nlogoscore reload-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore reload-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"action\":\"reload\",\"module\":\"test_basic_module\",\"previous_status\":\"not_loaded\",\"status\":\"loaded\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module addInts 40 2\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module addInts 40 2", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":42,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.13 Stop the daemon\n\nShut down the daemon cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe daemon removes its state file and exits. You can also stop it with\n`Ctrl+C` if running in the foreground, or by sending `SIGTERM` to the\ndaemon PID shown in `logoscore status`.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.14 Confirm the daemon has stopped\n\nA final `status` confirms the shutdown. With no daemon running, the\nclient reports `not_running` instead of connecting (and exits non-zero,\nso we add `|| true` to let the doc-test assert on the output):\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"a7935aec89ca\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
