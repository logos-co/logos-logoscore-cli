  .exec:last-child { margin-bottom: 0; }
  .exec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

p 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Load the module family\n\nLoading a proxy auto-resolves its provider dependencies, but we load each\nmodule explicitly so every one is present regardless.\n\n```bash\nfor m in test_fullapi_cpp test_fullapi_rust test_fullapi_proxy test_fullapi_proxy_rust; do\n  ./logos/bin/logoscore load-module \"$m\"\ndone\n./logos/bin/logoscore list-modules\n\n```", "execs": [{"kind": "run", "cmd": "for m in test_fullapi_cpp test_fullapi_rust test_fullapi_proxy test_fullapi_proxy_rust; do\n  ./logos/bin/logoscore load-module \"$m\"\ndone\n./logos/bin/logoscore list-modules\n", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_fullapi_cpp\",\"status\":\"ok\",\"version\":\"1.0.0\"}\n{\"dependencies_loaded\":[],\"module\":\"test_fullapi_rust\",\"status\":\"ok\",\"version\":\"1.0.0\"}\n{\"dependencies_loaded\":[],\"module\":\"test_fullapi_proxy\",\"status\":\"ok\",\"version\":\"1.0.0\"}\n{\"dependencies_loaded\":[],\"module\":\"test_fullapi_proxy_rust\",\"status\":\"ok\",\"version\":\"1.0.0\"}\n[{\"name\":\"test_fullapi_rust\",\"status\":\"loaded\",\"uptime_seconds\":0,\"version\":\"1.0.0\"},{\"name\":\"test_fullapi_proxy\",\"status\":\"loaded\",\"uptime_seconds\":0,\"version\":\"1.0.0\"},{\"name\":\"test_fullapi_proxy_rust\",\"status\":\"loaded\",\"uptime_seconds\":0,\"version\":\"1.0.0\"},{\"name\":\"test_fullapi_cpp\",\"status\":\"loaded\",\"uptime_seconds\":0,\"version\":\"1.0.0\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":3,\"version\":\"1.0.0\"}]\n", "note": ""}]}, {"md": "## Step 4: Cross-language providers answer identically\n\nThe C++ and Rust providers implement the same contract. Each echo returns\nits input unchanged, so both answer identically; `whoAmI` is the one\nintentional difference (it names the implementation).", "execs": []}, {"md": "### 4.1 Identity\n\n```bash\n./logos/bin/logoscore call test_fullapi_cpp whoAmI\n./logos/bin/logoscore call test_fullapi_rust whoAmI\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_cpp whoAmI\n./logos/bin/logoscore call test_fullapi_rust whoAmI\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"whoAmI\",\"module\":\"test_fullapi_cpp\",\"result\":\"test_fullapi_cpp\",\"status\":\"ok\"}\n{\"method\":\"whoAmI\",\"module\":\"test_fullapi_rust\",\"result\":\"test_fullapi_rust\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.2 Scalar echoes (int / uint / double / bool / string)\n\n```bash\nfor mod in test_fullapi_cpp test_fullapi_rust; do\n  echo \"== $mod ==\"\n  ./logos/bin/logoscore call \"$mod\" echoInt 42\n  ./logos/bin/logoscore call \"$mod\" echoUint 7\n  ./logos/bin/logoscore call \"$mod\" echoDouble 3.5\n  ./logos/bin/logoscore call \"$mod\" echoBool true\n  ./logos/bin/logoscore call \"$mod\" echoString hello\ndone\n\n```", "execs": [{"kind": "run", "cmd": "for mod in test_fullapi_cpp test_fullapi_rust; do\n  echo \"== $mod ==\"\n  ./logos/bin/logoscore call \"$mod\" echoInt 42\n  ./logos/bin/logoscore call \"$mod\" echoUint 7\n  ./logos/bin/logoscore call \"$mod\" echoDouble 3.5\n  ./logos/bin/logoscore call \"$mod\" echoBool true\n  ./logos/bin/logoscore call \"$mod\" echoString hello\ndone\n", "status": "pass", "exit_code": 0, "output": "== test_fullapi_cpp ==\n{\"method\":\"echoInt\",\"module\":\"test_fullapi_cpp\",\"result\":42,\"status\":\"ok\"}\n{\"method\":\"echoUint\",\"module\":\"test_fullapi_cpp\",\"result\":7,\"status\":\"ok\"}\n{\"method\":\"echoDouble\",\"module\":\"test_fullapi_cpp\",\"result\":3.5,\"status\":\"ok\"}\n{\"method\":\"echoBool\",\"module\":\"test_fullapi_cpp\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"echoString\",\"module\":\"test_fullapi_cpp\",\"result\":\"hello\",\"status\":\"ok\"}\n== test_fullapi_rust ==\n{\"method\":\"echoInt\",\"module\":\"test_fullapi_rust\",\"result\":42,\"status\":\"ok\"}\n{\"method\":\"echoUint\",\"module\":\"test_fullapi_rust\",\"result\":7,\"status\":\"ok\"}\n{\"method\":\"echoDouble\",\"module\":\"test_fullapi_rust\",\"result\":3.5,\"status\":\"ok\"}\n{\"method\":\"echoBool\",\"module\":\"test_fullapi_rust\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"echoString\",\"module\":\"test_fullapi_rust\",\"result\":\"hello\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.3 List / map / literal args (json: and str: prefixes)\n\nPositional args are scalars by default; the `json:` prefix parses the\nargument as JSON (a list, a map, or any nested value) and `str:` forces\na literal string. Both providers echo every container back unchanged,\nproving each decodes the CLI-supplied lists and maps identically \u2014 the\nsame coverage the proxy's `probeArrays` gives, driven straight from the\ncommand line.\n\n```bash\nfor mod in test_fullapi_cpp test_fullapi_rust; do\n  echo \"== $mod ==\"\n  ./logos/bin/logoscore call \"$mod\" echoIntList 'json:[1,2,3]'\n  ./logos/bin/logoscore call \"$mod\" echoStringList 'json:[\"a\",\"b\"]'\n  ./logos/bin/logoscore call \"$mod\" echoMap 'json:{\"k\":\"v\"}'\n  ./logos/bin/logoscore call \"$mod\" echoString 'str:json:literal'\ndone\n\n```", "execs": [{"kind": "run", "cmd": "for mod in test_fullapi_cpp test_fullapi_rust; do\n  echo \"== $mod ==\"\n  ./logos/bin/logoscore call \"$mod\" echoIntList 'json:[1,2,3]'\n  ./logos/bin/logoscore call \"$mod\" echoStringList 'json:[\"a\",\"b\"]'\n  ./logos/bin/logoscore call \"$mod\" echoMap 'json:{\"k\":\"v\"}'\n  ./logos/bin/logoscore call \"$mod\" echoString 'str:json:literal'\ndone\n", "status": "pass", "exit_code": 0, "output": "== test_fullapi_cpp ==\n{\"method\":\"echoIntList\",\"module\":\"test_fullapi_cpp\",\"result\":[1,2,3],\"status\":\"ok\"}\n{\"method\":\"echoStringList\",\"module\":\"test_fullapi_cpp\",\"result\":[\"a\",\"b\"],\"status\":\"ok\"}\n{\"method\":\"echoMap\",\"module\":\"test_fullapi_cpp\",\"result\":{\"k\":\"v\"},\"status\":\"ok\"}\n{\"method\":\"echoString\",\"module\":\"test_fullapi_cpp\",\"result\":\"json:literal\",\"status\":\"ok\"}\n== test_fullapi_rust ==\n{\"method\":\"echoIntList\",\"module\":\"test_fullapi_rust\",\"result\":[1,2,3],\"status\":\"ok\"}\n{\"method\":\"echoStringList\",\"module\":\"test_fullapi_rust\",\"result\":[\"a\",\"b\"],\"status\":\"ok\"}\n{\"method\":\"echoMap\",\"module\":\"test_fullapi_rust\",\"result\":{\"k\":\"v\"},\"status\":\"ok\"}\n{\"method\":\"echoString\",\"module\":\"test_fullapi_rust\",\"result\":\"json:literal\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.4 Binary (bstr) argument via the _bytes encoding\n\nJSON has no byte type, so a `bstr` argument uses the canonical tagged\nencoding `{\"_bytes\":\"<base64url>\"}`. Passed with `json:` it decodes to\nthe provider's bytes parameter, and a `bstr` return comes back in the\nsame canonical form \u2014 here `aGVsbG8` is base64url of `hello`, which\n`echoBytes` returns unchanged (bytes are NOT auto-decoded to a string,\nso the response carries the `_bytes` tag, not the literal text).\n\n```bash\n./logos/bin/logoscore call test_fullapi_cpp echoBytes 'json:{\"_bytes\":\"aGVsbG8\"}'\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_cpp echoBytes 'json:{\"_bytes\":\"aGVsbG8\"}'\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"echoBytes\",\"module\":\"test_fullapi_cpp\",\"result\":{\"_bytes\":\"aGVsbG8\"},\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.5 Result return (success and error)\n\n```bash\n./logos/bin/logoscore call test_fullapi_cpp makeResult true\n./logos/bin/logoscore call test_fullapi_rust makeResult true\n./logos/bin/logoscore call test_fullapi_cpp makeResult false\n./logos/bin/logoscore call test_fullapi_rust makeResult false\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_cpp makeResult true\n./logos/bin/logoscore call test_fullapi_rust makeResult true\n./logos/bin/logoscore call test_fullapi_cpp makeResult false\n./logos/bin/logoscore call test_fullapi_rust makeResult false\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"makeResult\",\"module\":\"test_fullapi_cpp\",\"result\":{\"error\":null,\"success\":true,\"value\":{\"ok\":true,\"provider\":\"test_fullapi_cpp\"}},\"status\":\"ok\"}\n{\"method\":\"makeResult\",\"module\":\"test_fullapi_rust\",\"result\":{\"error\":null,\"success\":true,\"value\":{\"ok\":true,\"provider\":\"test_fullapi_rust\"}},\"status\":\"ok\"}\n{\"method\":\"makeResult\",\"module\":\"test_fullapi_cpp\",\"result\":{\"error\":\"deliberate error for testing\",\"success\":false,\"value\":null},\"status\":\"ok\"}\n{\"method\":\"makeResult\",\"module\":\"test_fullapi_rust\",\"result\":{\"error\":\"deliberate error for testing\",\"success\":false,\"value\":null},\"status\":\"ok\"}\n", "note": ""}]}, {"md": "## Step 5: The C++ proxy forwards to either provider\n\n`test_fullapi_proxy` binds the `full_api` interface to a runtime-chosen\nmodule. `whoAmI` proves which provider a call resolved to.", "execs": []}, {"md": "### 5.1 Bind to the C++ provider\n\n```bash\n./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy whoAmI\n./logos/bin/logoscore call test_fullapi_proxy echoInt 99\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy whoAmI\n./logos/bin/logoscore call test_fullapi_proxy echoInt 99\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"whoAmI\",\"module\":\"test_fullapi_proxy\",\"result\":\"test_fullapi_cpp\",\"status\":\"ok\"}\n{\"method\":\"echoInt\",\"module\":\"test_fullapi_proxy\",\"result\":99,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.2 Re-bind to the Rust provider\n\n```bash\n./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy whoAmI\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy whoAmI\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"whoAmI\",\"module\":\"test_fullapi_proxy\",\"result\":\"test_fullapi_rust\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.3 Every array type round-trips through the bound provider\n\nBeyond passing arrays straight from the CLI (see the `json:` step\nabove), the proxy's `probeArrays` round-trips one array of every array\ntype \u2014 `[int]`, `[uint]`, `[float64]`, `[bool]`, `[tstr]`, `[any]` \u2014\nthrough the bound provider and reports the received sizes. This\nexercises the proxy's *own* forwarding path (proxy \u2192 provider), so\nrunning it against both the C++ and the Rust provider proves each\ndecodes every array type identically across that hop too.\n\n```bash\n./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy probeArrays\n./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy probeArrays\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy probeArrays\n./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy probeArrays\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"probeArrays\",\"module\":\"test_fullapi_proxy\",\"result\":\"intList=3 uintList=2 doubleList=2 boolList=2 stringList=2 anyList=3\",\"status\":\"ok\"}\n{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"probeArrays\",\"module\":\"test_fullapi_proxy\",\"result\":\"intList=3 uintList=2 doubleList=2 boolList=2 stringList=2 anyList=3\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.4 Async forwarding of the FULL surface through the proxy (start -> read)\n\nThe proxy also forwards through the **asynchronous** client wrappers (the\ngenerated `<method>Async` twins). `probeAsync` fires EVERY method of the\nfull_api surface \u2014 scalars, bstr, any, every array type, map and result \u2014\nasynchronously and returns immediately; the completions land out-of-band\non the transport's delivery thread. A moment later `getAsyncProbe` reads\nthe verified tally back as a single `ALL_OK_ASYNC:<provider>` token,\nproving the proxy -> provider **async** path for the whole surface,\nagainst both the C++ and the Rust provider. (This is the same non-blocking\npath the UI exercises in the Basecamp full-API check.)\n\n```bash\n./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy probeAsync\nsleep 2\n./logos/bin/logoscore call test_fullapi_proxy getAsyncProbe\n./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy probeAsync\nsleep 2\n./logos/bin/logoscore call test_fullapi_proxy getAsyncProbe\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy probeAsync\nsleep 2\n./logos/bin/logoscore call test_fullapi_proxy getAsyncProbe\n./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy probeAsync\nsleep 2\n./logos/bin/logoscore call test_fullapi_proxy getAsyncProbe\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"probeAsync\",\"module\":\"test_fullapi_proxy\",\"result\":\"started\",\"status\":\"ok\"}\n{\"method\":\"getAsyncProbe\",\"module\":\"test_fullapi_proxy\",\"result\":\"ALL_OK_ASYNC:test_fullapi_cpp\",\"status\":\"ok\"}\n{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"probeAsync\",\"module\":\"test_fullapi_proxy\",\"result\":\"started\",\"status\":\"ok\"}\n{\"method\":\"getAsyncProbe\",\"module\":\"test_fullapi_proxy\",\"result\":\"ALL_OK_ASYNC:test_fullapi_rust\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.5 Event round-trip (subscribe is done at load; trigger -> read)\n\nThe proxy subscribes to the bound provider's events and captures the\nlatest. Triggering an event, then reading it back, exercises the whole\nprovider -> proxy event path. The daemon's event loop pumps the delivery\nbetween the two client calls.\n\n```bash\n./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy fireStringEvent hello\nsleep 1\n./logos/bin/logoscore call test_fullapi_proxy getLastEvent\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy fireStringEvent hello\nsleep 1\n./logos/bin/logoscore call test_fullapi_proxy getLastEvent\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"fireStringEvent\",\"module\":\"test_fullapi_proxy\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"getLastEvent\",\"module\":\"test_fullapi_proxy\",\"result\":\"stringEvent:hello\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.6 Cross-language event round-trip\n\n```bash\n./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy fireIntEvent 7\nsleep 1\n./logos/bin/logoscore call test_fullapi_proxy getLastEvent\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_proxy useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy fireIntEvent 7\nsleep 1\n./logos/bin/logoscore call test_fullapi_proxy getLastEvent\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"fireIntEvent\",\"module\":\"test_fullapi_proxy\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"getLastEvent\",\"module\":\"test_fullapi_proxy\",\"result\":\"intEvent:7\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "## Step 6: The Rust proxy does the same, in Rust\n\n`test_fullapi_proxy_rust` is the Rust mirror: it consumes `full_api` via the\nsame interface dependency (a generated `FullApiClient::bind`) and re-exposes\nit. It forwards to and captures events from both providers too.", "execs": []}, {"md": "### 6.1 Forward to both providers\n\n```bash\n./logos/bin/logoscore call test_fullapi_proxy_rust useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy_rust whoAmI\n./logos/bin/logoscore call test_fullapi_proxy_rust echoDouble 2.5\n./logos/bin/logoscore call test_fullapi_proxy_rust useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy_rust whoAmI\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_proxy_rust useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy_rust whoAmI\n./logos/bin/logoscore call test_fullapi_proxy_rust echoDouble 2.5\n./logos/bin/logoscore call test_fullapi_proxy_rust useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy_rust whoAmI\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy_rust\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"whoAmI\",\"module\":\"test_fullapi_proxy_rust\",\"result\":\"test_fullapi_cpp\",\"status\":\"ok\"}\n{\"method\":\"echoDouble\",\"module\":\"test_fullapi_proxy_rust\",\"result\":2.5,\"status\":\"ok\"}\n{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy_rust\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"whoAmI\",\"module\":\"test_fullapi_proxy_rust\",\"result\":\"test_fullapi_rust\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 6.2 Async forwarding of the FULL surface through the Rust proxy (start -> read)\n\nThe Rust proxy forwards the whole surface asynchronously too, through the\ngenerated `<method>_async` client wrappers. As with the C++ proxy,\n`probeAsync` fires every method without blocking and `getAsyncProbe` reads\nthe verified tally back as `ALL_OK_ASYNC:<provider>` \u2014 so the full async\npath is exercised through both a C++ AND a Rust consumer, against both\nproviders (2x2 with the sync matrix).\n\n```bash\n./logos/bin/logoscore call test_fullapi_proxy_rust useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy_rust probeAsync\nsleep 2\n./logos/bin/logoscore call test_fullapi_proxy_rust getAsyncProbe\n./logos/bin/logoscore call test_fullapi_proxy_rust useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy_rust probeAsync\nsleep 2\n./logos/bin/logoscore call test_fullapi_proxy_rust getAsyncProbe\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_proxy_rust useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy_rust probeAsync\nsleep 2\n./logos/bin/logoscore call test_fullapi_proxy_rust getAsyncProbe\n./logos/bin/logoscore call test_fullapi_proxy_rust useProvider test_fullapi_rust\n./logos/bin/logoscore call test_fullapi_proxy_rust probeAsync\nsleep 2\n./logos/bin/logoscore call test_fullapi_proxy_rust getAsyncProbe\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy_rust\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"probeAsync\",\"module\":\"test_fullapi_proxy_rust\",\"result\":\"started\",\"status\":\"ok\"}\n{\"method\":\"getAsyncProbe\",\"module\":\"test_fullapi_proxy_rust\",\"result\":\"ALL_OK_ASYNC:test_fullapi_cpp\",\"status\":\"ok\"}\n{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy_rust\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"probeAsync\",\"module\":\"test_fullapi_proxy_rust\",\"result\":\"started\",\"status\":\"ok\"}\n{\"method\":\"getAsyncProbe\",\"module\":\"test_fullapi_proxy_rust\",\"result\":\"ALL_OK_ASYNC:test_fullapi_rust\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 6.3 Event round-trip through the Rust proxy\n\n```bash\n./logos/bin/logoscore call test_fullapi_proxy_rust useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy_rust fireStringEvent hi\nsleep 1\n./logos/bin/logoscore call test_fullapi_proxy_rust getLastEvent\n\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_fullapi_proxy_rust useProvider test_fullapi_cpp\n./logos/bin/logoscore call test_fullapi_proxy_rust fireStringEvent hi\nsleep 1\n./logos/bin/logoscore call test_fullapi_proxy_rust getLastEvent\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"useProvider\",\"module\":\"test_fullapi_proxy_rust\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"fireStringEvent\",\"module\":\"test_fullapi_proxy_rust\",\"result\":true,\"status\":\"ok\"}\n{\"method\":\"getLastEvent\",\"module\":\"test_fullapi_proxy_rust\",\"result\":\"stringEvent:hi\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "## Step 7: Shut down", "execs": []}, {"md": "### 7.1 Stop the daemon\n\n```bash\n./logos/bin/logoscore stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}]}, {"meta": {"name": "Concurrent Clients Against a Blocking Module Method", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Concurrent Clients Against a Blocking Module Method\n\nThis doc-test stress-tests the daemon's request handling with a **blocking**\nmodule method. `test_basic_module` exposes `echoWithDelay(value, delayMs)`,\nwhich sleeps `delayMs` milliseconds on the module's thread before returning \u2014\nso while one call is in flight, the module can do nothing else.\n\nWe start a daemon, load the module, then fire **five independent client\nprocesses at once** (each backgrounded `logoscore call` is its own process \u2014\nthe same as running the command in five separate terminals simultaneously),\nevery one of them invoking the 2-second blocking call. Because the module is\nsingle-threaded, the daemon serializes the five requests: they run one after\nanother, so the wall-clock time is the *sum* of the sleeps (~10s), not the\nlongest single one (~2s).\n\nThe point of the exercise is robustness: many clients piling onto a method\nthat holds the module thread must **serialize cleanly \u2014 no crash, no deadlock,\nno dropped replies** \u2014 and the daemon must stay healthy and responsive\nafterwards.\n\n**What you'll learn:**\n\n- How to load a module that exposes a blocking (synchronous, sleeping) method\n- How to drive one daemon from several concurrent client processes at once\n- That a single-threaded module serializes concurrent calls (total time \u2248 sum of the per-call sleeps), rather than running them in parallel\n- That every concurrent client still receives its correct reply\n- That the daemon survives the burst \u2014 no crash, all modules still loaded, and ordinary calls keep working afterwards\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`", "execs": []}, {"md": "## Step 1: Build logoscore\n\nBuild the logoscore CLI from the published flake. The result is symlinked to\n`./logos/` for easy reference in the steps below.", "execs": []}, {"md": "### 1.1 Build the CLI\n\n```bash\nnix build 'github:logos-co/logos-logoscore-cli/6dfb85df5df62ace6f2b3133d66735e941dd6f73' --out-link ./logos\n```\n\nThe build produces `logos/bin/logoscore` plus bundled runtime libraries and\na `logos/modules/` directory containing the built-in `capability_module`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-logoscore-cli/6dfb85df5df62ace6f2b3133d66735e941dd6f73' --out-link ./logos", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Prepare a modules directory\n\nInstall `test_basic_module` from logos-test-modules and copy the bundled\n`capability_module` (required for auth when loading modules) into a single\n`./modules/` directory for the daemon to scan.", "execs": []}, {"md": "### 2.1 Install a module to load\n\nBuild `test_basic_module` and merge it with the bundled capability module\ninto `./modules/`:\n\n```bash\nSYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\ncp -RL ./result-module/modules/. ./modules/\n\n```\n\n`test_basic_module` exposes `echoWithDelay(value, delayMs)` \u2014 it sleeps\n`delayMs` milliseconds on the module thread, then returns `value`. That\nblocking behaviour is exactly what lets us observe serialization.", "execs": [{"kind": "run", "cmd": "SYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\ncp -RL ./result-module/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "this path will be fetched (448.6 KiB download, 1.7 MiB unpacked):\n  /nix/store/li24vlhsf3msjhwq6hlb6sfsr2a8336n-logos-test_basic_module-module-lib-install\ncopying path '/nix/store/li24vlhsf3msjhwq6hlb6sfsr2a8336n-logos-test_basic_module-module-lib-install' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "## Step 3: Start the daemon and load the blocking module\n\nStart the daemon in the background, then load `test_basic_module` and confirm\nits blocking method works for a single call before piling on concurrent ones.", "execs": []}, {"md": "### 3.1 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Load the module\n\nLoad `test_basic_module` into the running daemon:\n\n```bash\nlogoscore load-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_basic_module\",\"status\":\"ok\",\"version\":\"1.0.0\"}\n", "note": ""}]}, {"md": "### 3.3 Sanity-check the blocking method\n\nA single call to `echoWithDelay` blocks for the requested time and echoes\nits first argument back. Here we sleep 500 ms and get `warmup` returned:\n\n```bash\nlogoscore call test_basic_module echoWithDelay warmup 500\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module echoWithDelay warmup 500", "status": "pass", "exit_code": 0, "output": "{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"warmup\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "## Step 4: Hit the blocking method from five concurrent clients\n\nNow launch **five client processes at once**, each calling the 2-second\nblocking method. Each `( logoscore call \u2026 ) &` is an independent process \u2014\nequivalent to running the command in five separate shells simultaneously.\nWe time the whole burst and capture each client's reply to its own file.", "execs": []}, {"md": "### 4.1 Fire five concurrent blocking calls\n\nThe five calls are submitted at the same instant. Because the module is\nsingle-threaded, the daemon runs them one at a time, so the total\nwall-clock time is the *sum* of the five 2-second sleeps (~10s) rather\nthan ~2s. We assert it took at least 8 seconds \u2014 proof the calls\nserialized instead of running in parallel \u2014 and that nothing crashed.\n\n```bash\n# Five independent client processes, each a 2-second blocking call.\nfor i in 1 2 3 4 5; do\n  logoscore call test_basic_module echoWithDelay \"client-$i\" 2000 &\ndone\nwait\n```\n\nA single-threaded module can only run one call at a time, so five\nsimultaneous 2-second calls take ~10s end-to-end. If they had run\nconcurrently the burst would have finished in ~2s \u2014 the \u22658s wall-clock\nis the observable signature of clean serialization.", "execs": [{"kind": "run", "cmd": "START=$(date +%s)\nfor i in 1 2 3 4 5; do\n  ( ./logos/bin/logoscore call test_basic_module echoWithDelay \"client-$i\" 2000 > \"call-$i.out\" 2>&1 ) &\ndone\nwait\nEND=$(date +%s)\nELAPSED=$((END - START))\necho \"All 5 concurrent clients returned. Wall-clock: ${ELAPSED}s\"\nif [ \"$ELAPSED\" -ge 8 ]; then\n  echo \"SERIALIZED: total wall-clock ~= sum of the five 2s sleeps (not run in parallel)\"\nelse\n  echo \"UNEXPECTED: burst finished in ${ELAPSED}s \u2014 calls did not serialize as expected\"\nfi\n", "status": "pass", "exit_code": 0, "output": "All 5 concurrent clients returned. Wall-clock: 11s\nSERIALIZED: total wall-clock ~= sum of the five 2s sleeps (not run in parallel)\n", "note": ""}]}, {"md": "### 4.2 Every client got its own correct reply\n\nDespite contending for the same blocked module thread, each of the five\nclients received exactly its own value back \u2014 no replies were dropped,\ncrossed, or corrupted:\n\n```bash\ncat call-1.out call-2.out call-3.out call-4.out call-5.out\n```", "execs": [{"kind": "run", "cmd": "cat call-1.out call-2.out call-3.out call-4.out call-5.out", "status": "pass", "exit_code": 0, "output": "{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"client-1\",\"status\":\"ok\"}\n{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"client-2\",\"status\":\"ok\"}\n{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"client-3\",\"status\":\"ok\"}\n{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"client-4\",\"status\":\"ok\"}\n{\"method\":\"echoWithDelay\",\"module\":\"test_basic_module\",\"result\":\"client-5\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "## Step 5: Confirm the daemon survived the burst\n\nThe whole point is that the concurrent blocking storm causes no crash. Verify\nthe daemon is still running with the module loaded, that nothing crashed, and\nthat ordinary calls keep working.", "execs": []}, {"md": "### 5.1 Daemon and module are still healthy\n\nThe daemon is still `running`, the module still `loaded`, nothing crashed:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":19293,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"loaded\",\"uptime_seconds\":12,\"version\":\"1.0.0\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":15,\"version\":\"1.0.0\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":2,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 5.2 Ordinary calls still work\n\nA normal, non-blocking call succeeds after the storm:\n\n```bash\nlogoscore call test_basic_module addInts 40 2\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module addInts 40 2", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":42,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.3 Stop the daemon\n\nShut down the daemon cleanly:\n\n```bash\nlogoscore stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.4 Confirm the daemon has stopped\n\nA final `status` confirms the shutdown \u2014 with no daemon running the client\nreports `not_running` (and exits non-zero, so we add `|| true` to let the\ndoc-test assert on the output):\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"6233430e97b9\",\"status\":\"not_running\",\"version\":\"pre-release-6dfb85d\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}]}, {"meta": {"name": "Running Modules with the logoscore Daemon", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Running Modules with the logoscore Daemon\n\nThis doc-test walks through the **daemon mode** of `logoscore`: start a long-running\nprocess, inspect its status, load a module, introspect and call it, watch its\nresource usage, unload and reload it, and finally shut the daemon down \u2014 verifying\nat each stage that the command had the effect we expect.\n\n`logoscore` is the headless CLI frontend for the Logos platform. In daemon mode\n(`-D`), it runs in the background and exposes client subcommands (`status`,\n`list-modules`, `load-module`, `module-info`, `stats`, `call`, `unload-module`,\n`reload-module`, `stop`, \u2026) that connect over a local RPC channel.\n\n**What you'll learn:**\n\n- How to build and run the logoscore CLI\n- How to prepare a modules directory for the daemon to scan\n- How to start the daemon in the background and capture its logs\n- How to inspect the daemon and the modules it has discovered\n- How to load a module, introspect it with `module-info`, and call its methods\n- How to read per-module resource usage with `stats`\n- How `status` reflects the module lifecycle as you load, unload, and reload\n- How to stop the daemon and confirm it has actually exited\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`", "execs": []}, {"md": "## Step 1: Build logoscore\n\nBuild the logoscore CLI from the published flake. The result is symlinked to\n`./logos/` for easy reference in the steps below.", "execs": []}, {"md": "### 1.1 Build the CLI\n\n```bash\nnix build 'github:logos-co/logos-logoscore-cli/6dfb85df5df62ace6f2b3133d66735e941dd6f73' --out-link ./logos\n```\n\nThe build produces `logos/bin/logoscore` plus bundled runtime libraries and\na `logos/modules/` directory containing the built-in `capability_module`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-logoscore-cli/6dfb85df5df62ace6f2b3133d66735e941dd6f73' --out-link ./logos", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Prepare a modules directory\n\n`logoscore -m ./modules` scans `./modules/` for subdirectories containing\n`manifest.json`. We install `test_basic_module` from logos-test-modules and\ncopy the bundled `capability_module` (required for auth when loading modules).", "execs": []}, {"md": "### 2.1 Install a module to load\n\nBuild `test_basic_module` and merge it with the bundled capability module\ninto `./modules/`:\n\n```bash\nSYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\ncp -RL ./result-module/modules/. ./modules/\n\n```\n\nThe modules directory now contains:\n\n```\nmodules/\n\u251c\u2500\u2500 capability_module/\n\u2502   \u251c\u2500\u2500 manifest.json\n\u2502   \u2514\u2500\u2500 capability_module_plugin.{so,dylib}\n\u2514\u2500\u2500 test_basic_module/\n    \u251c\u2500\u2500 manifest.json\n    \u2514\u2500\u2500 test_basic_module_plugin.{so,dylib}\n```", "execs": [{"kind": "run", "cmd": "SYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\ncp -RL ./result-module/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 3: Run the daemon and call a module\n\nStart the daemon in the background, then use client subcommands to interact\nwith it. Output from the daemon process is captured in `logs.txt`.", "execs": []}, {"md": "### 3.1 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```\n\nThe `-D` flag starts the daemon. The client subcommands in the following\nsteps connect to this running process via the config written under\n`~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Inspect the startup log\n\nReview the daemon's startup output:\n\n```bash\ncat logs.txt\n```", "execs": [{"kind": "run", "cmd": "cat logs.txt", "status": "pass", "exit_code": 0, "output": "[2026-07-22 13:01:21.624] [info] [logos] [capability_module] CapabilityModulePlugin: created\n[2026-07-22 13:01:21.624] [info] [logos] [capability_module] [LogosProviderObject] LogosAPIProvider: wrapping QObject in QtProviderObject for \"capability_module\"\n[2026-07-22 13:01:21.624] [info] [logos] [capability_module] qt.core.qobject.connect: QObject::connect: No such signal CapabilityModulePlugin::eventResponse(QString, QVariantList)\n[2026-07-22 13:01:21.624] [info] [logos] [capability_module] [LogosProviderObject] QtProviderObject: connected to QObject eventResponse signal\n[2026-07-22 13:01:21.624] [info] [logos] [capability_module] [LogosProviderObject] QtProviderObject: calling initLogos on wrapped QObject\n[2026-07-22 13:01:21.624] [info] [logos] [capability_module] CapabilityModulePlugin: LogosAPI initialized\n[2026-07-22 13:01:21.624] [info] [logos] [capability_module] [LogosProviderObject] ModuleProxy: created, wrapping LogosProviderObject \"capability_module\"\n[2026-07-22 13:01:21.625] [info] [logos] [capability_module] RemoteTransportHost: Created registry host with URL: \"local:logos_capability_module_918b18ce2edc\"\n[2026-07-22 13:01:21.625] [info] [logos] [capability_module] RemoteTransportHost: Published object: \"capability_module\"\n[2026-07-22 13:01:21.625] [info] [logos] [capability_module] [LogosProviderObject] LogosAPIProvider: successfully published \"capability_module\"\n[2026-07-22 13:01:21.836] [info] [logos] [capability_module] [LogosProviderObject] QtProviderObject: saving token for module: \"capability_module\"\n[2026-07-22 13:01:21.836] [info] [logos] Module loaded: capability_module\nLogoscore daemon started (pid 20311, instance 918b18ce2edc)\nDaemon state: /tmp/doctest-test-5k0xytf_/.logoscore/daemon/state.json\nLocal client config: /tmp/doctest-test-5k0xytf_/.logoscore/client/config.json\n", "note": ""}]}, {"md": "### 3.3 Check daemon status\n\nVerify the daemon is running and inspect its health. Every client\ncommand renders a human-readable form on a terminal and JSON when its\noutput is piped; `--human` and `--json` force either form explicitly:\n\n```bash\nlogoscore status            # human-readable (default on a TTY)\nlogoscore status --json     # JSON (default when piped)\n```\n\nHuman-readable form:\n\n```text\nLogoscore Daemon\n  Status:       running\n  PID:          12345\n  Uptime:       6s\n  Version:      v0.2.0\n\nModules: 1 loaded, 0 crashed, 1 not loaded\n  test_basic_module  v1.0.0  not_loaded  -\n  capability_module  v1.0.0  loaded      6s\n```\n\nJSON form:\n\n```json\n{\"daemon\":{\"status\":\"running\",\"pid\":12345,\"uptime_seconds\":6,\"version\":\"0.2.0\"},\n \"modules_summary\":{\"loaded\":1,\"crashed\":0,\"not_loaded\":1},\n \"modules\":[{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":6,\"version\":\"1.0.0\"},\n            {\"name\":\"test_basic_module\",\"status\":\"not_loaded\",\"version\":\"1.0.0\"}]}\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status --human\necho '# --- JSON ---'\n./logos/bin/logoscore status --json\n", "status": "pass", "exit_code": 0, "output": "Logoscore Daemon\n  Status:       running\n  PID:          20311\n  Uptime:       0s\n  Version:      v1.0.0\n\nModules: 1 loaded, 0 crashed, 1 not loaded\n  test_basic_module  v1.0.0  not_loaded  -\n  capability_module  v1.0.0  loaded      3s\n# --- JSON ---\n{\"daemon\":{\"pid\":20311,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\",\"version\":\"1.0.0\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":3,\"version\":\"1.0.0\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "### 3.4 List discovered modules\n\nList modules visible in the scan directory, in both forms:\n\n```bash\nlogoscore list-modules            # human-readable table\nlogoscore list-modules --json     # JSON\n```\n\nHuman-readable table (the `NAME`/`VERSION` columns size to fit):\n\n```text\nNAME               VERSION  STATUS      UPTIME\ntest_basic_module  v1.0.0   not_loaded  -\ncapability_module  v1.0.0   loaded      6s\n```\n\nThe same data as JSON \u2014 `version` is present even for `not_loaded`\nmodules (it comes from each module's metadata, not the running process):\n\n```json\n[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\",\"version\":\"1.0.0\"},\n {\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":6,\"version\":\"1.0.0\"}]\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore list-modules --human\necho '# --- JSON ---'\n./logos/bin/logoscore list-modules --json\n", "status": "pass", "exit_code": 0, "output": "NAME               VERSION  STATUS      UPTIME\ntest_basic_module  v1.0.0   not_loaded  -\ncapability_module  v1.0.0   loaded      3s\n# --- JSON ---\n[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\",\"version\":\"1.0.0\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":3,\"version\":\"1.0.0\"}]\n", "note": ""}]}, {"md": "### 3.5 Load the module\n\nLoad `test_basic_module` into the running daemon:\n\n```bash\nlogoscore load-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"test_basic_module\",\"status\":\"ok\",\"version\":\"1.0.0\"}\n", "note": ""}]}, {"md": "### 3.6 Confirm the module is now loaded\n\nRe-run `status`. The module that was `not_loaded` before now reports\n`loaded`, and once loaded it carries an uptime (shown in both forms):\n\n```bash\nlogoscore status\nlogoscore status --json\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status --human\necho '# --- JSON ---'\n./logos/bin/logoscore status --json\n", "status": "pass", "exit_code": 0, "output": "Logoscore Daemon\n  Status:       running\n  PID:          20311\n  Uptime:       0s\n  Version:      v1.0.0\n\nModules: 2 loaded, 0 crashed, 0 not loaded\n  test_basic_module  v1.0.0  loaded      0s\n  capability_module  v1.0.0  loaded      3s\n# --- JSON ---\n{\"daemon\":{\"pid\":20311,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"loaded\",\"uptime_seconds\":0,\"version\":\"1.0.0\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":3,\"version\":\"1.0.0\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":2,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 3.7 Module subprocesses are isolated from the launcher's process group\n\nWith a module loaded, the daemon is running it in its own subprocess\n(`logos_host`). The daemon itself stays in the **foreground**, in its\nlauncher's process group, so a shell, `systemd`, or Docker manages it\nnormally \u2014 but each `logos_host` must lead its **own** process group, not\nstay in the daemon's (i.e. the launcher's). Otherwise tearing the module\ntree down on shutdown, or any process-group signal aimed at the daemon,\nleaks into the launcher and can kill the shell driving it (a teardown\nstep dying with exit `-15` on Linux).\n\nWe take a module subprocess (a `logos_host` child of the daemon) and\nassert it is its **own** process-group leader (`pgid == pid`) and is\n**not** in the daemon's group.\n\n```bash\n# a module subprocess must lead its own group: pgid == pid, != daemon\ndpid=$(logoscore status --json | jq .daemon.pid)\nhost=$(pgrep -P \"$dpid\" -f logos_host | head -1)\n[ \"$host\" = \"$(ps -o pgid= -p \"$host\" | tr -d ' ')\" ] && echo ISOLATED\n```", "execs": [{"kind": "run", "cmd": "dpid=$(./logos/bin/logoscore status --json | python3 -c \"import json,sys;print(json.load(sys.stdin)['daemon']['pid'])\")\ndpgid=$(ps -o pgid= -p \"$dpid\" | tr -d ' ')\nresult=NO_MODULE_SUBPROCESS\nfor hp in $(pgrep -f logos_host); do\n  [ \"$(ps -o ppid= -p \"$hp\" | tr -d ' ')\" = \"$dpid\" ] || continue\n  hpgid=$(ps -o pgid= -p \"$hp\" | tr -d ' ')\n  if [ \"$hp\" = \"$hpgid\" ] && [ \"$hpgid\" != \"$dpgid\" ]; then\n    result=MODULE_SUBPROCESS_ISOLATED; break\n  else\n    result=MODULE_SUBPROCESS_SHARES_LAUNCHER_GROUP\n  fi\ndone\necho \"daemon_pid=$dpid daemon_pgid=$dpgid -> $result\"\n", "status": "pass", "exit_code": 0, "output": "daemon_pid=20311 daemon_pgid=992 -> MODULE_SUBPROCESS_ISOLATED\n", "note": ""}]}, {"md": "### 3.8 Inspect the module with module-info\n\n`module-info` shows a single module's status and the `Q_INVOKABLE`\nmethods it exposes \u2014 the same methods you can `call`:\n\n```bash\nlogoscore module-info test_basic_module\nlogoscore module-info test_basic_module --json\n```\n\nHuman-readable form (methods list trimmed):\n\n```text\nName:          test_basic_module\nVersion:       v1.0.0\nStatus:        loaded\nUptime:        6s\n\nMethods:\n  returnTrue() -> bool\n  addInts(a: int, b: int) -> int\n  ...\n```\n\nJSON form \u2014 version, dependencies, dependents, uptime, and the full\nmethod/event interface in one object:\n\n```json\n{\"name\":\"test_basic_module\",\"version\":\"1.0.0\",\"status\":\"loaded\",\n \"uptime_seconds\":6,\"dependencies\":[],\"dependents\":[],\n \"methods\":[{\"name\":\"returnTrue\",\"returnType\":\"bool\",\"signature\":\"returnTrue()\"}, ...],\n \"events\":[]}\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore module-info test_basic_module --human\necho '# --- JSON ---'\n./logos/bin/logoscore module-info test_basic_module --json\n", "status": "pass", "exit_code": 0, "output": "Name:          test_basic_module\nVersion:       v1.0.0\nStatus:        loaded\nPID:           0\nUptime:        1s\n\nMethods:\n  eventResponse(eventName: QString, args: QVariantList) -> void\n  initLogos(logosAPIInstance: LogosAPI*) -> void\n  doNothing() -> void\n  doNothingWithArgs(a: QString, b: int) -> void\n  returnTrue() -> bool\n  returnFalse() -> bool\n  isPositive(value: int) -> bool\n  returnInt() -> int\n  addInts(a: int, b: int) -> int\n  stringLength(s: QString) -> int\n  returnString() -> QString\n  echo(input: QString) -> QString\n  concat(a: QString, b: QString) -> QString\n  successResult() -> LogosResult\n  errorResult() -> LogosResult\n  resultWithMap() -> LogosResult\n  resultWithList() -> LogosResult\n  validateInput(input: QString) -> LogosResult\n  returnVariantInt() -> QVariant\n  returnVariantString() -> QVariant\n  returnVariantMap() -> QVariant\n  returnVariantList() -> QVariant\n  returnJsonArray() -> QJsonArray\n  makeJsonArray(a: QString, b: QString) -> QJsonArray\n  returnStringList() -> QStringList\n  splitString(input: QString) -> QStringList\n  echoInt(n: int) -> int\n  echoBool(b: bool) -> bool\n  joinStrings(list: QStringList) -> QString\n  byteArraySize(data: QByteArray) -> int\n  urlToString(url: QUrl) -> QString\n  noArgs() -> QString\n  oneArg(a: QString) -> QString\n  twoArgs(a: QString, b: int) -> QString\n  threeArgs(a: QString, b: int, c: bool) -> QString\n  fourArgs(a: QString, b: int, c: bool, d: QString) -> QString\n  fiveArgs(a: QString, b: int, c: bool, d: QString, e: int) -> QString\n  emitTestEvent(data: QString) -> void\n  emitMultiArgEvent(name: QString, count: int) -> void\n  echoWithDelay(value: QString, delayMs: int) -> QString\n  crashOnDemand() -> void\n# --- JSON ---\n{\"dependencies\":[],\"dependents\":[],\"events\":[],\"methods\":[{\"isInvokable\":false,\"name\":\"eventResponse\",\"parameters\":[{\"name\":\"eventName\",\"type\":\"QString\"},{\"name\":\"args\",\"type\":\"QVariantList\"}],\"returnType\":\"void\",\"signature\":\"eventResponse(QString,QVariantList)\"},{\"isInvokable\":true,\"name\":\"initLogos\",\"parameters\":[{\"name\":\"logosAPIInstance\",\"type\":\"LogosAPI*\"}],\"returnType\":\"void\",\"signature\":\"initLogos(LogosAPI*)\"},{\"isInvokable\":true,\"name\":\"doNothing\",\"returnType\":\"void\",\"signature\":\"doNothing()\"},{\"isInvokable\":true,\"name\":\"doNothingWithArgs\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"int\"}],\"returnType\":\"void\",\"signature\":\"doNothingWithArgs(QString,int)\"},{\"isInvokable\":true,\"name\":\"returnTrue\",\"returnType\":\"bool\",\"signature\":\"returnTrue()\"},{\"isInvokable\":true,\"name\":\"returnFalse\",\"returnType\":\"bool\",\"signature\":\"returnFalse()\"},{\"isInvokable\":true,\"name\":\"isPositive\",\"parameters\":[{\"name\":\"value\",\"type\":\"int\"}],\"returnType\":\"bool\",\"signature\":\"isPositive(int)\"},{\"isInvokable\":true,\"name\":\"returnInt\",\"returnType\":\"int\",\"signature\":\"returnInt()\"},{\"isInvokable\":true,\"name\":\"addInts\",\"parameters\":[{\"name\":\"a\",\"type\":\"int\"},{\"name\":\"b\",\"type\":\"int\"}],\"returnType\":\"int\",\"signature\":\"addInts(int,int)\"},{\"isInvokable\":true,\"name\":\"stringLength\",\"parameters\":[{\"name\":\"s\",\"type\":\"QString\"}],\"returnType\":\"int\",\"signature\":\"stringLength(QString)\"},{\"isInvokable\":true,\"name\":\"returnString\",\"returnType\":\"QString\",\"signature\":\"returnString()\"},{\"isInvokable\":true,\"name\":\"echo\",\"parameters\":[{\"name\":\"input\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"echo(QString)\"},{\"isInvokable\":true,\"name\":\"concat\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"concat(QString,QString)\"},{\"isInvokable\":true,\"name\":\"successResult\",\"returnType\":\"LogosResult\",\"signature\":\"successResult()\"},{\"isInvokable\":true,\"name\":\"errorResult\",\"returnType\":\"LogosResult\",\"signature\":\"errorResult()\"},{\"isInvokable\":true,\"name\":\"resultWithMap\",\"returnType\":\"LogosResult\",\"signature\":\"resultWithMap()\"},{\"isInvokable\":true,\"name\":\"resultWithList\",\"returnType\":\"LogosResult\",\"signature\":\"resultWithList()\"},{\"isInvokable\":true,\"name\":\"validateInput\",\"parameters\":[{\"name\":\"input\",\"type\":\"QString\"}],\"returnType\":\"LogosResult\",\"signature\":\"validateInput(QString)\"},{\"isInvokable\":true,\"name\":\"returnVariantInt\",\"returnType\":\"QVariant\",\"signature\":\"returnVariantInt()\"},{\"isInvokable\":true,\"name\":\"returnVariantString\",\"returnType\":\"QVariant\",\"signature\":\"returnVariantString()\"},{\"isInvokable\":true,\"name\":\"returnVariantMap\",\"returnType\":\"QVariant\",\"signature\":\"returnVariantMap()\"},{\"isInvokable\":true,\"name\":\"returnVariantList\",\"returnType\":\"QVariant\",\"signature\":\"returnVariantList()\"},{\"isInvokable\":true,\"name\":\"returnJsonArray\",\"returnType\":\"QJsonArray\",\"signature\":\"returnJsonArray()\"},{\"isInvokable\":true,\"name\":\"makeJsonArray\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"QString\"}],\"returnType\":\"QJsonArray\",\"signature\":\"makeJsonArray(QString,QString)\"},{\"isInvokable\":true,\"name\":\"returnStringList\",\"returnType\":\"QStringList\",\"signature\":\"returnStringList()\"},{\"isInvokable\":true,\"name\":\"splitString\",\"parameters\":[{\"name\":\"input\",\"type\":\"QString\"}],\"returnType\":\"QStringList\",\"signature\":\"splitString(QString)\"},{\"isInvokable\":true,\"name\":\"echoInt\",\"parameters\":[{\"name\":\"n\",\"type\":\"int\"}],\"returnType\":\"int\",\"signature\":\"echoInt(int)\"},{\"isInvokable\":true,\"name\":\"echoBool\",\"parameters\":[{\"name\":\"b\",\"type\":\"bool\"}],\"returnType\":\"bool\",\"signature\":\"echoBool(bool)\"},{\"isInvokable\":true,\"name\":\"joinStrings\",\"parameters\":[{\"name\":\"list\",\"type\":\"QStringList\"}],\"returnType\":\"QString\",\"signature\":\"joinStrings(QStringList)\"},{\"isInvokable\":true,\"name\":\"byteArraySize\",\"parameters\":[{\"name\":\"data\",\"type\":\"QByteArray\"}],\"returnType\":\"int\",\"signature\":\"byteArraySize(QByteArray)\"},{\"isInvokable\":true,\"name\":\"urlToString\",\"parameters\":[{\"name\":\"url\",\"type\":\"QUrl\"}],\"returnType\":\"QString\",\"signature\":\"urlToString(QUrl)\"},{\"isInvokable\":true,\"name\":\"noArgs\",\"returnType\":\"QString\",\"signature\":\"noArgs()\"},{\"isInvokable\":true,\"name\":\"oneArg\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"oneArg(QString)\"},{\"isInvokable\":true,\"name\":\"twoArgs\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"int\"}],\"returnType\":\"QString\",\"signature\":\"twoArgs(QString,int)\"},{\"isInvokable\":true,\"name\":\"threeArgs\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"int\"},{\"name\":\"c\",\"type\":\"bool\"}],\"returnType\":\"QString\",\"signature\":\"threeArgs(QString,int,bool)\"},{\"isInvokable\":true,\"name\":\"fourArgs\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"int\"},{\"name\":\"c\",\"type\":\"bool\"},{\"name\":\"d\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"fourArgs(QString,int,bool,QString)\"},{\"isInvokable\":true,\"name\":\"fiveArgs\",\"parameters\":[{\"name\":\"a\",\"type\":\"QString\"},{\"name\":\"b\",\"type\":\"int\"},{\"name\":\"c\",\"type\":\"bool\"},{\"name\":\"d\",\"type\":\"QString\"},{\"name\":\"e\",\"type\":\"int\"}],\"returnType\":\"QString\",\"signature\":\"fiveArgs(QString,int,bool,QString,int)\"},{\"isInvokable\":true,\"name\":\"emitTestEvent\",\"parameters\":[{\"name\":\"data\",\"type\":\"QString\"}],\"returnType\":\"void\",\"signature\":\"emitTestEvent(QString)\"},{\"isInvokable\":true,\"name\":\"emitMultiArgEvent\",\"parameters\":[{\"name\":\"name\",\"type\":\"QString\"},{\"name\":\"count\",\"type\":\"int\"}],\"returnType\":\"void\",\"signature\":\"emitMultiArgEvent(QString,int)\"},{\"isInvokable\":true,\"name\":\"echoWithDelay\",\"parameters\":[{\"name\":\"value\",\"type\":\"QString\"},{\"name\":\"delayMs\",\"type\":\"int\"}],\"returnType\":\"QString\",\"signature\":\"echoWithDelay(QString,int)\"},{\"isInvokable\":true,\"name\":\"crashOnDemand\",\"returnType\":\"void\",\"signature\":\"crashOnDemand()\"}],\"name\":\"test_basic_module\",\"status\":\"loaded\",\"uptime_seconds\":1,\"version\":\"1.0.0\"}\n", "note": ""}]}, {"md": "### 3.9 Check resource usage with stats\n\n`stats` reports per-module resource usage (process id, CPU, memory) for\nthe modules the daemon is running:\n\n```bash\nlogoscore stats\nlogoscore stats --json\n```\n\nHuman-readable table:\n\n```text\nMODULE             PID     CPU%    MEMORY\ntest_basic_module  12350   0.0%    18.9 MB\ncapability_module  12340   4.6%    19.5 MB\n```\n\nJSON form:\n\n```json\n[{\"name\":\"test_basic_module\",\"cpu_percent\":0.0,\"cpu_time_seconds\":1.02,\"memory_mb\":18.9},\n {\"name\":\"capability_module\",\"cpu_percent\":4.6,\"cpu_time_seconds\":1.10,\"memory_mb\":19.5}]\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stats --human\necho '# --- JSON ---'\n./logos/bin/logoscore stats --json\n", "status": "pass", "exit_code": 0, "output": "MODULE      PID     CPU%    MEMORY\ntest_basic_module0       0.0%    19.5 MB\ncapability_module0       0.0%    19.7 MB\n# --- JSON ---\n[{\"cpu_percent\":0.0,\"cpu_time_seconds\":1.548452,\"memory_mb\":19.484375,\"name\":\"test_basic_module\"},{\"cpu_percent\":5.113888888888838,\"cpu_time_seconds\":1.207443,\"memory_mb\":19.734375,\"name\":\"capability_module\"}]\n", "note": ""}]}, {"md": "### 3.10 Call methods\n\nInvoke methods on the loaded module, in both forms:\n\n```bash\nlogoscore call test_basic_module returnTrue\nlogoscore call test_basic_module returnTrue --json\n```\n\nThe human-readable form prints just the return value:\n\n```text\ntrue\n```\n\nThe JSON form wraps it with the call's metadata:\n\n```json\n{\"status\":\"ok\",\"module\":\"test_basic_module\",\"method\":\"returnTrue\",\"result\":true}\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module returnTrue --human\necho '# --- JSON ---'\n./logos/bin/logoscore call test_basic_module returnTrue --json\n", "status": "pass", "exit_code": 0, "output": "true\n# --- JSON ---\n{\"method\":\"returnTrue\",\"module\":\"test_basic_module\",\"result\":true,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module addInts 2 3\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module addInts 2 3", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":5,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module echo hello\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module echo hello", "status": "pass", "exit_code": 0, "output": "{\"method\":\"echo\",\"module\":\"test_basic_module\",\"result\":\"hello\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module returnString\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module returnString", "status": "pass", "exit_code": 0, "output": "{\"method\":\"returnString\",\"module\":\"test_basic_module\",\"result\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.11 Unload the module\n\nRemove `test_basic_module` from the daemon:\n\n```bash\nlogoscore unload-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore unload-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"module\":\"test_basic_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.12 Confirm the unload took effect\n\nA `call` against the now-unloaded module is rejected \u2014 the daemon reports\nthat it is not loaded:\n\n```bash\nlogoscore call test_basic_module returnTrue\n```\n\n> The trailing `|| true` lets the doc-test continue past the expected\n> non-zero exit code so we can assert on the error message.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module returnTrue || true", "status": "pass", "exit_code": 0, "output": "{\"code\":\"RPC_FAILED\",\"message\":\"callModuleMethod('test_basic_module','returnTrue') RPC call failed.\",\"status\":\"error\"}\n", "note": ""}]}, {"md": "### 3.13 Reload the module\n\n`reload-module` unloads and re-loads a module in one step (handy after\nrebuilding it). The module is loaded and callable again afterwards:\n\n```bash\nlogoscore reload-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore reload-module test_basic_module", "status": "pass", "exit_code": 0, "output": "{\"action\":\"reload\",\"module\":\"test_basic_module\",\"previous_status\":\"not_loaded\",\"status\":\"loaded\",\"version\":\"1.0.0\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call test_basic_module addInts 40 2\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call test_basic_module addInts 40 2", "status": "pass", "exit_code": 0, "output": "{\"method\":\"addInts\",\"module\":\"test_basic_module\",\"result\":42,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 3.14 Stop the daemon\n\nShut down the daemon cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe daemon removes its state file and exits. You can also stop it with\n`Ctrl+C` if running in the foreground, or by sending `SIGTERM` to the\ndaemon PID shown in `logoscore status`.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.15 Confirm the daemon has stopped\n\nA final `status` confirms the shutdown. With no daemon running, the\nclient reports `not_running` instead of connecting (and exits non-zero,\nso we add `|| true` to let the doc-test assert on the output):\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"918b18ce2edc\",\"status\":\"not_running\",\"version\":\"pre-release-6dfb85d\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}, {"md": "### 3.16 A worker is not orphaned if the daemon crashes\n\nThe flip side of detaching workers into their own process group: a\nmodule subprocess must not be left **running** if the daemon dies\n*without* cleaning it up. We start a throwaway daemon, **hard-kill** it\n(`SIGKILL`, so no graceful teardown runs), and confirm its module\nsubprocess exits on its own \u2014 via `PR_SET_PDEATHSIG` on Linux and a\n`getppid` watchdog on other platforms. (Graceful shutdown, above, still\nreaps workers per-PID; this covers the crash path.)\n\n```bash\n# hard-kill the daemon; its module subprocess must exit on its own\nlogoscore -D -m ./modules &      # (throwaway)\nkill -9 \"$(logoscore status --json | jq .daemon.pid)\"\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore -D --config-dir ./crashcfg -m ./modules > crash.log 2>&1 &\nsleep 5\ndpid=$(./logos/bin/logoscore --config-dir ./crashcfg status --json | python3 -c \"import json,sys;print(json.load(sys.stdin)['daemon']['pid'])\")\nworker=\"\"\nfor h in $(pgrep -f logos_host); do\n  [ \"$(ps -o ppid= -p \"$h\" | tr -d ' ')\" = \"$dpid\" ] && { worker=\"$h\"; break; }\ndone\necho \"daemon=$dpid worker=$worker\"\nkill -9 \"$dpid\"\nresult=LEAKED\nfor i in $(seq 1 10); do\n  kill -0 \"$worker\" 2>/dev/null || { result=WORKER_CLEANED_UP; break; }\n  sleep 1\ndone\necho \"RESULT=$result\"\n", "status": "pass", "exit_code": 0, "output": "daemon=21256 worker=21259\nRESULT=WORKER_CLEANED_UP\n", "note": ""}]}]}, {"meta": {"name": "Reaching the logoscore Daemon over TCP and TCP+TLS", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Reaching the logoscore Daemon over TCP and TCP+TLS\n\nBy default the `logoscore` daemon binds every module to a local Unix socket,\nso only clients on the same host \u2014 using the auto-emitted config under\n`~/.logoscore/` \u2014 can reach it. This doc-test shows how to expose the daemon\nover the network instead, using the two non-local transports `logoscore`\nsupports:\n\n- **`tcp`** \u2014 a plaintext TCP listener. Good for loopback and trusted\n  networks. On a non-loopback host it puts the auth token on the wire in\n  cleartext, so the daemon refuses to bind it there without `--insecure-tcp`.\n- **`tcp_ssl`** \u2014 a TLS-wrapped TCP listener. The wire is encrypted with a\n  server certificate; the client verifies that certificate against a CA.\n\nWe drive everything on a single host over the loopback interface\n(`127.0.0.1`) so the doc-test is self-contained and needs no second machine,\nbut the moving parts \u2014 a per-module network listener on the daemon, a\nhand-written `client/config.json` dial spec, and a copied auth token \u2014 are\nexactly the ones a real remote client uses.\n\n> \u26a0\ufe0f **Remote operation is under active development.** The transport flags,\n> the `client/config.json` schema, and the auth model may change between\n> releases. Local same-host use is the stable path. In particular, this\n> walkthrough authenticates the network client with the daemon's\n> **auto-emitted token** (`client/auto.json`), which is the credential the\n> daemon registers for itself at boot \u2014 operator-issued `issue-token`\n> credentials are not yet honored for `core_service` calls over the network.\n\n**What you'll learn:**\n\n- How the daemon's per-module transports work and why `local` is always present\n- How to add a `tcp` listener to the well-known modules with `--module-transport`\n- Why both `core_service` and `capability_module` must be exposed, not just one\n- How the plaintext-TCP guard protects you from leaking tokens on the wire\n- How to write a `client/config.json` dial spec and point a client at it with `--config-dir`\n- How to copy the daemon's auth token into the client config directory\n- How to drive the daemon (`status`, `load-module`, `call`, \u2026) over TCP\n- How to switch the same setup to `tcp_ssl` with a self-signed certificate\n- How TLS peer verification fails closed when the client has no CA to trust\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **OpenSSL** on `PATH` (only the final TLS section needs it) to generate a\nthrowaway self-signed certificate.\n\nVerify: `openssl version`", "execs": []}, {"md": "## Step 1: Build logoscore and prepare modules\n\nBuild the CLI and assemble a modules directory, exactly as in the daemon\ndoc-test. The daemon needs the bundled `capability_module` (used for the\nclient handshake) plus at least one ordinary module to load and call \u2014\nhere `test_basic_module` from logos-test-modules.", "execs": []}, {"md": "### 1.1 Build the CLI\n\n```bash\nnix build 'github:logos-co/logos-logoscore-cli/6dfb85df5df62ace6f2b3133d66735e941dd6f73' --out-link ./logos\n```\n\nThe build produces `logos/bin/logoscore` plus a `logos/modules/`\ndirectory containing the built-in `capability_module`.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-logoscore-cli/6dfb85df5df62ace6f2b3133d66735e941dd6f73' --out-link ./logos", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 1.2 Install a module to load\n\nBuild `test_basic_module` and merge it with the bundled capability\nmodule into `./modules/`:\n\n```bash\nSYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\n# cp -RL copies the read-only nix-store trees as read-only files, so a\n# re-run (or a pre-populated modules/) can't overwrite them. Restore\n# write permission first to keep the copy idempotent.\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./logos/modules/. ./modules/\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./result-module/modules/. ./modules/\n\n```\n\n```\nmodules/\n\u251c\u2500\u2500 capability_module/\n\u2502   \u251c\u2500\u2500 manifest.json\n\u2502   \u2514\u2500\u2500 capability_module_plugin.{so,dylib}\n\u2514\u2500\u2500 test_basic_module/\n    \u251c\u2500\u2500 manifest.json\n    \u2514\u2500\u2500 test_basic_module_plugin.{so,dylib}\n```", "execs": [{"kind": "run", "cmd": "SYSTEM=$(nix eval --impure --raw --expr 'builtins.currentSystem')\nnix build \"github:logos-co/logos-test-modules#modules.$SYSTEM.test_basic_module.install\" --out-link ./result-module\nmkdir -p modules\n# cp -RL copies the read-only nix-store trees as read-only files, so a\n# re-run (or a pre-populated modules/) can't overwrite them. Restore\n# write permission first to keep the copy idempotent.\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./logos/modules/. ./modules/\nchmod -R u+w ./modules 2>/dev/null || true\ncp -RL ./result-module/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Start the daemon with TCP listeners\n\n`--module-transport NAME=PROTOCOL[,k=v...]` adds one network listener to\nthe named module. We bind **both** well-known modules on loopback:\n`core_service` on port 6000 and `capability_module` on port 6001.\n\nTwo things worth calling out:\n\n- **`local` is always present.** Every configured module keeps its\n  same-host Unix-socket listener; the `tcp` entry is an *additional*\n  outside-facing surface. That's what lets the daemon's own\n  intra-process calls keep working while remote clients use TCP.\n- **Expose `capability_module`, not just `core_service`.** Before its\n  first call, a client performs a `requestModule` handshake against\n  `capability_module` to resolve the endpoint. A remote client has no\n  Unix socket to the daemon, so that handshake has to ride the network\n  too. Expose only `core_service` and remote client commands hang or fail\n  at connect time.\n\nWe use `--config-dir ./daemon-home` to keep all daemon state inside the\nworking directory instead of `~/.logoscore`.", "execs": []}, {"md": "### 2.1 Refuse plaintext TCP on a public interface\n\nFirst, a guardrail. Plaintext `tcp` on a non-loopback host would put\nthe auth token on the wire in cleartext, so the daemon refuses to bind\nit unless you explicitly pass `--insecure-tcp`. Watch it reject a\n`0.0.0.0` listener (the `|| true` lets the doc-test continue past the\nexpected non-zero exit):\n\n```bash\nlogoscore -D -m ./modules --module-transport core_service=tcp,host=0.0.0.0,port=6000\n```\n\nOn loopback (`127.0.0.1`) there is nothing to leak to, so the same\nflag binds without the escape hatch \u2014 which is what we do next.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./daemon-home -D -m ./modules --module-transport core_service=tcp,host=0.0.0.0,port=6000 2>&1 || true", "status": "pass", "exit_code": 0, "output": "Error: module 'core_service' binds plaintext tcp on non-loopback host '0.0.0.0'. Use protocol=tcp_ssl, or pass --insecure-tcp if you really mean it.\n", "note": ""}]}, {"md": "### 2.2 Start the daemon on loopback TCP\n\nStart the daemon in the background with TCP listeners for both\nwell-known modules, capturing its output to `daemon.log`:\n\n```bash\nlogoscore -D -m ./modules \\\n    --module-transport core_service=tcp,host=127.0.0.1,port=6000 \\\n    --module-transport capability_module=tcp,host=127.0.0.1,port=6001 \\\n    > daemon.log &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore --config-dir ./daemon-home -D -m ./modules --module-transport core_service=tcp,host=127.0.0.1,port=6000 --module-transport capability_module=tcp,host=127.0.0.1,port=6001 > daemon.log 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 4\n```", "execs": [{"kind": "run", "cmd": "sleep 4", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 2.3 Confirm the resolved transports\n\nThe daemon records the transports it actually bound in\n`daemon/state.json`. Each well-known module shows the implicit\n`local` listener first, followed by the `tcp` one we asked for:\n\n```bash\ncat ~/.logoscore/daemon/state.json\n```", "execs": [{"kind": "run", "cmd": "cat ./daemon-home/daemon/state.json", "status": "pass", "exit_code": 0, "output": "{\n    \"config_source\": \"cli\",\n    \"instance_id\": \"a9d69563e194\",\n    \"pid\": 21519,\n    \"resolved\": {\n        \"insecure_tcp\": false,\n        \"modules\": {\n            \"capability_module\": {\n                \"transports\": [\n                    {\n                        \"protocol\": \"local\"\n                    },\n                    {\n                        \"codec\": \"json\",\n                        \"host\": \"127.0.0.1\",\n                        \"port\": 6001,\n                        \"protocol\": \"tcp\"\n                    }\n                ]\n            },\n            \"core_service\": {\n                \"transports\": [\n                    {\n                        \"protocol\": \"local\"\n                    },\n                    {\n                        \"codec\": \"json\",\n                        \"host\": \"127.0.0.1\",\n                        \"port\": 6000,\n                        \"protocol\": \"tcp\"\n                    }\n                ]\n            }\n        },\n        \"modules_dirs\": [\n            \"./modules\"\n        ],\n        \"persistence_path\": \"\",\n        \"ssl\": {\n            \"ca\": \"\",\n            \"cert\": \"\",\n            \"key\": \"\"\n        }\n    },\n    \"started_at\": \"2026-07-22T13:02:18Z\",\n    \"version\": 2\n}\n", "note": ""}]}, {"md": "## Step 3: Point a client at the daemon over TCP\n\nA network client doesn't read the daemon's files \u2014 it dials whatever its\nown `client/config.json` says and authenticates with a token file beside\nit. We build a **separate** config directory (`./client-home`) to make the\nclient/daemon split explicit, then point the client at it with\n`--config-dir`.\n\nThe directory layout the client expects:\n\n```\nclient-home/            \u2190 pass this to --config-dir\n\u2514\u2500\u2500 client/\n    \u251c\u2500\u2500 config.json     \u2190 the dial spec\n    \u2514\u2500\u2500 auto.json       \u2190 the auth token referenced by token_file\n```", "execs": []}, {"md": "### 3.1 Copy the daemon's auth token\n\nAt boot the daemon emits its own token to\n`client/auto.json` under its config dir. Copy that into the client's\n`client/` directory \u2014 it's the credential the client will present:\n\n```bash\nmkdir -p ./client-home/client\ncp ./daemon-home/client/auto.json ./client-home/client/auto.json\n\n```\n\n> On a real remote host you'd `scp` this file across instead of\n> copying it locally. Treat it as a secret: anything holding it can\n> drive the daemon.", "execs": [{"kind": "run", "cmd": "mkdir -p ./client-home/client\ncp ./daemon-home/client/auto.json ./client-home/client/auto.json\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Write the dial spec\n\nThe `client/config.json` schema is version `2`. `token_file` names the\nfile you just copied, and the `daemon` block lists one entry per\nmodule with its transport, host, and port \u2014 matching the listeners the\ndaemon bound. Both `core_service` and `capability_module` are required:\n\n```bash\ncat > ./client-home/client/config.json <<'JSON'\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6000 },\n        \"capability_module\": { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6001 }\n    }\n}\nJSON\n\n```", "execs": [{"kind": "run", "cmd": "cat > ./client-home/client/config.json <<'JSON'\n{\n    \"version\": 2,\n    \"token_file\": \"auto.json\",\n    \"daemon\": {\n        \"core_service\":      { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6000 },\n        \"capability_module\": { \"transport\": \"tcp\", \"host\": \"127.0.0.1\", \"port\": 6001 }\n    }\n}\nJSON\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.3 Check daemon status over TCP\n\nWith the dial spec in place, every client command works against\n`--config-dir ./client-home` \u2014 the traffic now goes over TCP:\n\n```bash\nlogoscore --config-dir ./client-home status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":21519,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\",\"version\":\"1.0.0\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":4,\"version\":\"1.0.0\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "### 3.4 List, load, and call over TCP\n\nDrive the module lifecycle exactly as you would locally:\n\n```bash\nlogoscore --config-dir ./client-home list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home list-modules", "status": "pass", "exit_code": 0, "output": "[{\"name\":\"test_basic_module\",\"status\":\"not_loaded\",\"version\":\"1.0.0\"},{\"name\":\"capability_module\",\"status\":\"loaded\",\"uptime_seconds\":4,\"version\":\"1.0.0\"}]\n", "note": ""}]}, {"md": "```bash\nlogoscore --config-dir ./client-home load-module test_basic_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir ./client-home load-module test_basic_module", "status":
